id: information-theory
label: Information & Coding Theory
description: >-
  Shannon entropy, mutual information, and Kullback-Leibler divergence; source coding
  (Kraft inequality, Huffman, arithmetic, Lempel-Ziv, rate-distortion); channel capacity
  and Shannon's noisy-channel coding theorem (discrete memoryless, Gaussian, feedback);
  information-theoretic statistics (Stein's lemma, Chernoff information, method of types,
  I-projection and Blahut-Arimoto); side-information problems (Slepian-Wolf, Wyner-Ziv,
  Gelfand-Pinsker, Costa dirty-paper); network information theory (multiple-access,
  broadcast, relay, interference channels); algebraic coding (weight enumerators,
  MacWilliams identity, algebraic-geometry codes, list decoding, expander codes); and
  modern capacity-achieving codes (LDPC with belief propagation, turbo codes, polar codes).
  Prerequisites are pulled in automatically so the result is always a complete, learnable path.
seed:
  field_in: [information-theory]
group_by: field
