<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Symbols</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        html, body { height: 100%; overflow: hidden; background: #08080d; font-family: 'SF Mono', 'Fira Code', 'Cascadia Code', monospace; }
        #scene { position: fixed; inset: 0; z-index: 0; }
        #symbol-bar {
            position: fixed;
            top: 0; left: 0; right: 0;
            z-index: 10;
            display: flex;
            flex-wrap: wrap;
            gap: 6px;
            padding: 14px 20px;
            background: rgba(8, 8, 13, 0.7);
            backdrop-filter: blur(8px);
            -webkit-backdrop-filter: blur(8px);
            border-bottom: 1px solid rgba(255,255,255,0.05);
        }
        #symbol-bar button {
            font-family: inherit;
            font-size: 10.5px;
            letter-spacing: 0.1em;
            text-transform: uppercase;
            color: rgba(212, 165, 116, 0.7);
            background: rgba(8, 8, 13, 0.4);
            border: 1px solid rgba(212, 165, 116, 0.22);
            padding: 7px 14px;
            cursor: pointer;
            transition: color 0.25s, border-color 0.25s, background 0.25s;
        }
        #symbol-bar button:hover {
            color: rgba(255, 235, 200, 0.95);
            border-color: rgba(212, 165, 116, 0.55);
            background: rgba(8, 8, 13, 0.7);
        }
        #symbol-bar button.active {
            color: rgba(255, 245, 220, 1);
            border-color: rgba(212, 165, 116, 0.8);
            background: rgba(40, 28, 12, 0.6);
        }
        #symbol-label {
            position: fixed;
            bottom: 16px;
            left: 0; right: 0;
            text-align: center;
            color: rgba(255, 255, 255, 0.4);
            font-size: 11px;
            letter-spacing: 0.15em;
            text-transform: uppercase;
            z-index: 10;
            pointer-events: none;
        }
        #hint {
            position: fixed;
            bottom: 16px;
            right: 24px;
            color: rgba(255, 255, 255, 0.25);
            font-size: 10px;
            letter-spacing: 0.1em;
            z-index: 10;
            pointer-events: none;
        }
    </style>
</head>
<body>
    <div id="symbol-bar">
        <button data-symbol="ouroboros"      data-module="./ouroboros.js">ouroboros</button>
        <button data-symbol="dharmachakra"   data-module="./dharmachakra.js">dharmachakra</button>
        <button data-symbol="trinity"        data-module="./trinity.js">trinity</button>
        <button data-symbol="gnomonic"       data-module="./gnomonic.js">gnomonic</button>
        <button data-symbol="vesica"         data-module="./vesica.js">vesica piscis</button>
        <button data-symbol="tree-of-life"   data-module="./tree-of-life.js">tree of life</button>
        <button data-symbol="sri-yantra"     data-module="./sri-yantra.js">sri yantra</button>
        <button data-symbol="aum"            data-module="./aum.js">aum</button>
        <button data-symbol="mandala"        data-module="./mandala.js">mandala</button>
        <button data-symbol="bagua"          data-module="./bagua.js">bagua</button>
        <button data-symbol="tetractys"      data-module="./tetractys.js">tetractys</button>
        <button data-symbol="whirling"       data-module="./whirling.js">whirling</button>
    </div>

    <div id="scene"></div>
    <div id="symbol-label"></div>
    <div id="hint">drag to orbit</div>

    <script type="importmap">
    {
        "imports": {
            "three": "./vendor/three.module.js",
            "three/addons/": "./vendor/"
        }
    }
    </script>
    <script type="module" src="symbols-main.js"></script>
</body>
</html>
