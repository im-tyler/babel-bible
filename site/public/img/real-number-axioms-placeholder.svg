<svg xmlns="http://www.w3.org/2000/svg" width="900" height="460" viewBox="0 0 900 460" role="img" aria-labelledby="title desc">
  <title id="title">The real line and the three families of axioms</title>
  <desc id="desc">A horizontal real number line with marks at zero and one, an arrow showing addition, and three labelled boxes identifying field, order, and completeness axioms.</desc>
  <rect width="900" height="460" fill="#f8fafc"/>
  <g transform="translate(70 70)">
    <line x1="0" y1="60" x2="760" y2="60" stroke="#1f2933" stroke-width="3"/>
    <polygon points="760,60 745,52 745,68" fill="#1f2933"/>
    <polygon points="0,60 15,52 15,68" fill="#1f2933"/>
    <g font-family="Inter, Arial, sans-serif" font-size="20" fill="#1f2933">
      <line x1="180" y1="50" x2="180" y2="70" stroke="#1f2933" stroke-width="3"/>
      <text x="180" y="98" text-anchor="middle">0</text>
      <line x1="320" y1="50" x2="320" y2="70" stroke="#1f2933" stroke-width="3"/>
      <text x="320" y="98" text-anchor="middle">1</text>
      <line x1="460" y1="50" x2="460" y2="70" stroke="#1f2933" stroke-width="3"/>
      <text x="460" y="98" text-anchor="middle">2</text>
      <line x1="600" y1="50" x2="600" y2="70" stroke="#1f2933" stroke-width="3"/>
      <text x="600" y="98" text-anchor="middle">3</text>
    </g>
    <text x="380" y="20" text-anchor="middle" font-family="Inter, Arial, sans-serif" font-size="22" fill="#1f2933">the real number line</text>
  </g>
  <g transform="translate(60 230)">
    <rect x="0" y="0" width="240" height="170" rx="8" fill="#ffffff" stroke="#1f2933" stroke-width="3"/>
    <text x="120" y="34" text-anchor="middle" font-family="Inter, Arial, sans-serif" font-size="22" fill="#1f2933">field axioms</text>
    <text x="120" y="64" text-anchor="middle" font-family="Inter, Arial, sans-serif" font-size="16" fill="#475569">9 rules for + and x</text>
    <text x="120" y="92" text-anchor="middle" font-family="Inter, Arial, sans-serif" font-size="16" fill="#475569">closure, associativity,</text>
    <text x="120" y="114" text-anchor="middle" font-family="Inter, Arial, sans-serif" font-size="16" fill="#475569">commutativity,</text>
    <text x="120" y="136" text-anchor="middle" font-family="Inter, Arial, sans-serif" font-size="16" fill="#475569">identities, inverses,</text>
    <text x="120" y="158" text-anchor="middle" font-family="Inter, Arial, sans-serif" font-size="16" fill="#475569">distributivity</text>
  </g>
  <g transform="translate(330 230)">
    <rect x="0" y="0" width="240" height="170" rx="8" fill="#ffffff" stroke="#1f2933" stroke-width="3"/>
    <text x="120" y="34" text-anchor="middle" font-family="Inter, Arial, sans-serif" font-size="22" fill="#1f2933">order axioms</text>
    <text x="120" y="64" text-anchor="middle" font-family="Inter, Arial, sans-serif" font-size="16" fill="#475569">3 rules for &lt;</text>
    <text x="120" y="92" text-anchor="middle" font-family="Inter, Arial, sans-serif" font-size="16" fill="#475569">trichotomy,</text>
    <text x="120" y="114" text-anchor="middle" font-family="Inter, Arial, sans-serif" font-size="16" fill="#475569">transitivity,</text>
    <text x="120" y="136" text-anchor="middle" font-family="Inter, Arial, sans-serif" font-size="16" fill="#475569">compatibility</text>
    <text x="120" y="158" text-anchor="middle" font-family="Inter, Arial, sans-serif" font-size="16" fill="#475569">with + and x</text>
  </g>
  <g transform="translate(600 230)">
    <rect x="0" y="0" width="240" height="170" rx="8" fill="#dcfce7" stroke="#16a34a" stroke-width="4"/>
    <text x="120" y="34" text-anchor="middle" font-family="Inter, Arial, sans-serif" font-size="22" fill="#1f2933">completeness</text>
    <text x="120" y="64" text-anchor="middle" font-family="Inter, Arial, sans-serif" font-size="16" fill="#475569">1 rule for sets</text>
    <text x="120" y="92" text-anchor="middle" font-family="Inter, Arial, sans-serif" font-size="16" fill="#475569">every bounded-above</text>
    <text x="120" y="114" text-anchor="middle" font-family="Inter, Arial, sans-serif" font-size="16" fill="#475569">non-empty subset</text>
    <text x="120" y="136" text-anchor="middle" font-family="Inter, Arial, sans-serif" font-size="16" fill="#475569">has a least</text>
    <text x="120" y="158" text-anchor="middle" font-family="Inter, Arial, sans-serif" font-size="16" fill="#475569">upper bound</text>
  </g>
</svg>
