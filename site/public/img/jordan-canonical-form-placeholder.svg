<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 960 460" role="img" aria-labelledby="title desc">
  <title id="title">Jordan canonical form: block-diagonal stretch-plus-shear decomposition</title>
  <desc id="desc">On the left, a four-by-four matrix in Jordan canonical form is shown as a block-diagonal arrangement of two Jordan blocks: a three-by-three block J_3(2) with eigenvalue 2 on the diagonal and 1s on the superdiagonal, and a one-by-one block J_1(5) containing the eigenvalue 5. On the right, a Jordan chain is drawn as a sequence of vectors v_1, v_2, v_3 connected by arrows labelled by the nilpotent shift N = T minus lambda I, ending at the zero vector; this is the basis on which J_3(lambda) acts. Below, the eigenvalues 2 (algebraic multiplicity 3, geometric multiplicity 1) and 5 (algebraic and geometric multiplicity 1) are listed, together with the minimal polynomial m_T(t) = (t minus 2) cubed times (t minus 5) and the characteristic polynomial chi_T(t) = (t minus 2) cubed times (t minus 5).</desc>
  <rect width="960" height="460" fill="#f8fafc"/>
  <defs>
    <marker id="jcf-arrow" markerWidth="12" markerHeight="12" refX="10" refY="6" orient="auto">
      <path d="M1 1 L11 6 L1 11 Z" fill="#dc2626"/>
    </marker>
    <marker id="jcf-arrow-gray" markerWidth="12" markerHeight="12" refX="10" refY="6" orient="auto">
      <path d="M1 1 L11 6 L1 11 Z" fill="#64748b"/>
    </marker>
  </defs>
  <g font-family="Inter, Arial, sans-serif" fill="#0f172a">
    <text x="40" y="40" font-size="24" font-weight="700">Jordan canonical form: blocks of stretch-plus-shear</text>
  </g>

  <!-- Left panel: block-diagonal matrix -->
  <g transform="translate(40,80)">
    <text x="0" y="20" font-size="18" font-weight="700" fill="#334155">block-diagonal matrix J = diag( J_3(2), J_1(5) )</text>

    <!-- The 4x4 matrix grid -->
    <g transform="translate(20,50)">
      <!-- outer brackets -->
      <path d="M0 0 L0 240 M-10 0 L0 0 M-10 240 L0 240" stroke="#0f172a" stroke-width="2" fill="none"/>
      <path d="M280 0 L280 240 M280 0 L290 0 M280 240 L290 240" stroke="#0f172a" stroke-width="2" fill="none"/>

      <!-- J_3(2) block - highlighted -->
      <rect x="10" y="10" width="170" height="170" fill="#dbeafe" stroke="#2563eb" stroke-width="2"/>
      <!-- J_1(5) block - highlighted -->
      <rect x="200" y="200" width="60" height="30" fill="#fee2e2" stroke="#dc2626" stroke-width="2"/>

      <!-- matrix entries -->
      <g font-size="20" text-anchor="middle" fill="#0f172a">
        <!-- row 1 -->
        <text x="40" y="40">2</text><text x="100" y="40">1</text><text x="160" y="40">0</text><text x="230" y="40">0</text>
        <!-- row 2 -->
        <text x="40" y="100">0</text><text x="100" y="100">2</text><text x="160" y="100">1</text><text x="230" y="100">0</text>
        <!-- row 3 -->
        <text x="40" y="160">0</text><text x="100" y="160">0</text><text x="160" y="160">2</text><text x="230" y="160">0</text>
        <!-- row 4 -->
        <text x="40" y="220">0</text><text x="100" y="220">0</text><text x="160" y="220">0</text><text x="230" y="220">5</text>
      </g>
    </g>
    <text x="40" y="320" font-size="14" fill="#2563eb" font-weight="700">J_3(2): one chain of length 3 at eigenvalue 2</text>
    <text x="40" y="340" font-size="14" fill="#dc2626" font-weight="700">J_1(5): a single eigenvector at eigenvalue 5</text>
  </g>

  <!-- Right panel: Jordan chain -->
  <g transform="translate(520,80)">
    <text x="0" y="20" font-size="18" font-weight="700" fill="#334155">Jordan chain at eigenvalue lambda, length 3</text>
    <text x="0" y="46" font-size="14" fill="#475569">N = T − λI acts as the shift v_3 → v_2 → v_1 → 0</text>

    <!-- chain vectors as labelled circles -->
    <g>
      <circle cx="50" cy="140" r="22" fill="#fff" stroke="#0f172a" stroke-width="2"/>
      <text x="50" y="146" text-anchor="middle" font-size="16" font-weight="700">v_1</text>
      <circle cx="180" cy="140" r="22" fill="#fff" stroke="#0f172a" stroke-width="2"/>
      <text x="180" y="146" text-anchor="middle" font-size="16" font-weight="700">v_2</text>
      <circle cx="310" cy="140" r="22" fill="#fff" stroke="#0f172a" stroke-width="2"/>
      <text x="310" y="146" text-anchor="middle" font-size="16" font-weight="700">v_3</text>
      <circle cx="-50" cy="140" r="20" fill="#e2e8f0" stroke="#64748b" stroke-width="2" stroke-dasharray="3 3" transform="translate(0,0)"/>
    </g>
    <!-- 0 node on far left -->
    <g>
      <circle cx="-50" cy="140" r="20" fill="none"/>
      <text x="-50" y="146" text-anchor="middle" font-size="16" font-weight="700" fill="#64748b">0</text>
    </g>

    <!-- arrows N -->
    <g fill="none" stroke-linecap="round" stroke-width="3">
      <path d="M-22 140 L8 140" stroke="#64748b" marker-end="url(#jcf-arrow-gray)"/>
      <path d="M76 140 L150 140" stroke="#dc2626" marker-end="url(#jcf-arrow)"/>
      <path d="M206 140 L280 140" stroke="#dc2626" marker-end="url(#jcf-arrow)"/>
    </g>
    <g font-size="14" fill="#dc2626" text-anchor="middle" font-weight="700">
      <text x="113" y="125">N</text>
      <text x="243" y="125">N</text>
    </g>
    <text x="-22" y="125" text-anchor="middle" font-size="14" fill="#64748b" font-weight="700">N</text>

    <text x="-50" y="200" font-size="13" fill="#475569">In the basis {v_1, v_2, v_3} the operator T</text>
    <text x="-50" y="218" font-size="13" fill="#475569">acts as the 3×3 Jordan block J_3(λ) = λI + N.</text>
    <text x="-50" y="236" font-size="13" fill="#475569">T v_1 = λ v_1; T v_2 = λ v_2 + v_1; T v_3 = λ v_3 + v_2.</text>
  </g>

  <!-- bottom strip: invariants -->
  <g font-family="Inter, Arial, sans-serif" fill="#0f172a">
    <text x="40" y="410" font-size="14" fill="#475569">eigenvalues: 2 (algebraic mult. 3, geometric mult. 1) and 5 (algebraic mult. 1, geometric mult. 1)</text>
    <text x="40" y="432" font-size="14" fill="#475569">minimal polynomial m_T(t) = (t − 2)^3 (t − 5);   characteristic polynomial χ_T(t) = (t − 2)^3 (t − 5)</text>
    <text x="40" y="452" font-size="14" fill="#475569">Segre characteristic at 2: (3); Segre characteristic at 5: (1)</text>
  </g>
</svg>
