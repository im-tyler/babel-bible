<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 720 360" role="img" aria-labelledby="title desc">
  <title id="title">Lagrangian Grassmannian and the Universal Maslov Class</title>
  <desc id="desc">A schematic of a Lagrangian plane rotating against a fixed reference plane, with a turning counter labelling the Maslov index.</desc>
  <rect width="720" height="360" fill="#f4f4ec"/>
  <g stroke="#5a3d6f" stroke-width="1.5" fill="none" opacity="0.35">
    <line x1="60" y1="180" x2="660" y2="180"/>
    <line x1="360" y1="40" x2="360" y2="320"/>
    <circle cx="360" cy="180" r="120"/>
    <circle cx="360" cy="180" r="60"/>
  </g>
  <line x1="360" y1="180" x2="540" y2="180" stroke="#222" stroke-width="3"/>
  <text x="555" y="185" font-family="Inter, Arial, sans-serif" font-size="16" fill="#222">reference L0</text>
  <g stroke="#d68a3a" stroke-width="4" stroke-linecap="round">
    <line x1="360" y1="180" x2="488" y2="92"/>
    <line x1="360" y1="180" x2="232" y2="268"/>
  </g>
  <text x="500" y="80" font-family="Inter, Arial, sans-serif" font-size="16" fill="#d68a3a">L(θ)</text>
  <g stroke="#3a7d4d" stroke-width="2" fill="none" opacity="0.75">
    <path d="M 360 180 m 80 0 a 80 80 0 0 1 -56 56" />
    <polygon points="304,236 296,232 300,242" fill="#3a7d4d" stroke="none"/>
  </g>
  <text x="430" y="252" font-family="Inter, Arial, sans-serif" font-size="14" fill="#3a7d4d">det² ↻</text>
  <rect x="40" y="40" width="160" height="60" fill="none" stroke="#5a3d6f" stroke-width="1.5"/>
  <text x="120" y="65" text-anchor="middle" font-family="Inter, Arial, sans-serif" font-size="14" fill="#222">Λ(n) = U(n)/O(n)</text>
  <text x="120" y="88" text-anchor="middle" font-family="Inter, Arial, sans-serif" font-size="13" fill="#555">Lagrangian Grassmannian</text>
  <rect x="520" y="280" width="160" height="60" fill="none" stroke="#5a3d6f" stroke-width="1.5"/>
  <text x="600" y="305" text-anchor="middle" font-family="Inter, Arial, sans-serif" font-size="14" fill="#222">Maslov(γ) = deg(det²∘γ)</text>
  <text x="600" y="328" text-anchor="middle" font-family="Inter, Arial, sans-serif" font-size="13" fill="#555">winding integer</text>
</svg>
