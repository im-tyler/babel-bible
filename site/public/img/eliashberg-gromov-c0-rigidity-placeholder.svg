<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 720 360" role="img" aria-labelledby="title desc">
  <title id="title">Eliashberg-Gromov C-zero Rigidity</title>
  <desc id="desc">A schematic placeholder diagram for the Eliashberg-Gromov C-zero rigidity theorem: a sequence of symplectomorphisms converging uniformly to a smooth diffeomorphism, with capacity invariance preserved through the limit.</desc>
  <rect width="720" height="360" fill="#f5f1e8"/>
  <g stroke="#2b5f7a" stroke-width="3" fill="none">
    <circle cx="160" cy="180" r="70"/>
    <circle cx="160" cy="180" r="62" stroke-dasharray="4 6" opacity="0.55"/>
    <circle cx="160" cy="180" r="54" stroke-dasharray="4 6" opacity="0.4"/>
  </g>
  <g stroke="#d4a017" stroke-width="3" fill="none">
    <ellipse cx="560" cy="180" rx="80" ry="60"/>
    <ellipse cx="560" cy="180" rx="78" ry="58" stroke-dasharray="4 6" opacity="0.55"/>
    <ellipse cx="560" cy="180" rx="76" ry="56" stroke-dasharray="4 6" opacity="0.4"/>
  </g>
  <path d="M240 180 Q360 100 470 180" fill="none" stroke="#5a4b3b" stroke-width="3" marker-end="url(#arrow)"/>
  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M0 0 L10 5 L0 10 z" fill="#5a4b3b"/>
    </marker>
  </defs>
  <text x="360" y="120" text-anchor="middle" font-family="Inter, Arial, sans-serif" font-size="18" fill="#2b3f4a" font-style="italic">phi_n converges in C0</text>
  <text x="160" y="285" text-anchor="middle" font-family="Inter, Arial, sans-serif" font-size="16" fill="#2b5f7a">c_G(B) = pi r^2</text>
  <text x="560" y="285" text-anchor="middle" font-family="Inter, Arial, sans-serif" font-size="16" fill="#a07a0b">c_G(phi(B)) = pi r^2</text>
  <text x="360" y="330" text-anchor="middle" font-family="Inter, Arial, sans-serif" font-size="22" fill="#222">Eliashberg-Gromov C0-Rigidity</text>
</svg>
