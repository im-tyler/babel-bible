<svg xmlns="http://www.w3.org/2000/svg" width="900" height="460" viewBox="0 0 900 460" role="img" aria-labelledby="title desc">
  <title id="title">Disease, illness, sickness and explanatory models</title>
  <desc id="desc">A single biological event (center) is read differently by the clinician (disease), the patient (illness), and the community (sickness); structural violence (left) shapes who falls ill and who is treated.</desc>
  <rect width="900" height="460" fill="#f8fafc"/>
  <g transform="translate(40 50)">
    <rect x="0" y="0" width="820" height="360" rx="10" fill="#ffffff" stroke="#1f2933" stroke-width="3"/>
    <text x="410" y="40" text-anchor="middle" font-family="Inter, Arial, sans-serif" font-size="24" fill="#1f2933">disease - illness - sickness</text>
    <line x1="40" y1="220" x2="780" y2="220" stroke="#94a3b8" stroke-width="2"/>
    <rect x="40" y="150" width="200" height="140" rx="8" fill="#fee2e2" stroke="#dc2626" stroke-width="2"/>
    <text x="140" y="185" text-anchor="middle" font-family="Inter, Arial, sans-serif" font-size="20" fill="#991b1b">disease</text>
    <text x="140" y="212" text-anchor="middle" font-family="Inter, Arial, sans-serif" font-size="14" fill="#991b1b">biological pathology</text>
    <text x="140" y="232" text-anchor="middle" font-family="Inter, Arial, sans-serif" font-size="14" fill="#991b1b">read by the clinician</text>
    <rect x="310" y="150" width="200" height="140" rx="8" fill="#dbeafe" stroke="#2563eb" stroke-width="2"/>
    <text x="410" y="185" text-anchor="middle" font-family="Inter, Arial, sans-serif" font-size="20" fill="#1e40af">illness</text>
    <text x="410" y="212" text-anchor="middle" font-family="Inter, Arial, sans-serif" font-size="14" fill="#1e40af">lived experience</text>
    <text x="410" y="232" text-anchor="middle" font-family="Inter, Arial, sans-serif" font-size="14" fill="#1e40af">read by the patient</text>
    <rect x="580" y="150" width="200" height="140" rx="8" fill="#dcfce7" stroke="#16a34a" stroke-width="2"/>
    <text x="680" y="185" text-anchor="middle" font-family="Inter, Arial, sans-serif" font-size="20" fill="#166534">sickness</text>
    <text x="680" y="212" text-anchor="middle" font-family="Inter, Arial, sans-serif" font-size="14" fill="#166534">social fact</text>
    <text x="680" y="232" text-anchor="middle" font-family="Inter, Arial, sans-serif" font-size="14" fill="#166534">read by the community</text>
    <line x1="240" y1="220" x2="310" y2="220" stroke="#64748b" stroke-width="2" marker-end="url(#arrow)"/>
    <line x1="510" y1="220" x2="580" y2="220" stroke="#64748b" stroke-width="2" marker-end="url(#arrow)"/>
    <text x="410" y="125" text-anchor="middle" font-family="Inter, Arial, sans-serif" font-size="15" fill="#475569">one biological event, three readings (Kleinman)</text>
    <g transform="translate(0 305)">
      <rect x="40" y="0" width="740" height="40" rx="6" fill="#fef3c7" stroke="#d97706" stroke-width="2"/>
      <text x="410" y="26" text-anchor="middle" font-family="Inter, Arial, sans-serif" font-size="16" fill="#92400e">structural violence (Farmer): who falls ill and who is treated follows the distribution of power</text>
    </g>
  </g>
  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#64748b"/>
    </marker>
  </defs>
</svg>
