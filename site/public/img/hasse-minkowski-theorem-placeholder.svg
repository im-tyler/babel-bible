<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 720 360" role="img" aria-labelledby="title desc">
  <title id="title">Hasse-Minkowski theorem</title>
  <desc id="desc">A schematic placeholder showing the rational number Q at the centre with arrows to its completions R and the p-adic fields Q_p, illustrating the local-global principle.</desc>
  <rect width="720" height="360" fill="#f7f7f2"/>
  <g font-family="serif" font-size="22" fill="#1f2933">
    <circle cx="360" cy="180" r="44" fill="#fff" stroke="#1f6f8b" stroke-width="3"/>
    <text x="360" y="188" text-anchor="middle">Q</text>
    <circle cx="120" cy="80" r="38" fill="#fff" stroke="#1f6f8b" stroke-width="2"/>
    <text x="120" y="88" text-anchor="middle">R</text>
    <circle cx="120" cy="280" r="38" fill="#fff" stroke="#1f6f8b" stroke-width="2"/>
    <text x="120" y="288" text-anchor="middle">Q_2</text>
    <circle cx="280" cy="320" r="38" fill="#fff" stroke="#1f6f8b" stroke-width="2"/>
    <text x="280" y="328" text-anchor="middle">Q_3</text>
    <circle cx="440" cy="320" r="38" fill="#fff" stroke="#1f6f8b" stroke-width="2"/>
    <text x="440" y="328" text-anchor="middle">Q_5</text>
    <circle cx="600" cy="280" r="38" fill="#fff" stroke="#1f6f8b" stroke-width="2"/>
    <text x="600" y="288" text-anchor="middle">Q_7</text>
    <circle cx="600" cy="80" r="38" fill="#fff" stroke="#1f6f8b" stroke-width="2"/>
    <text x="600" y="88" text-anchor="middle">Q_p</text>
  </g>
  <g fill="none" stroke="#f2b134" stroke-width="3">
    <line x1="320" y1="160" x2="155" y2="100"/>
    <line x1="320" y1="200" x2="155" y2="260"/>
    <line x1="345" y1="220" x2="295" y2="290"/>
    <line x1="375" y1="220" x2="425" y2="290"/>
    <line x1="400" y1="200" x2="565" y2="260"/>
    <line x1="400" y1="160" x2="565" y2="100"/>
  </g>
  <g font-family="serif" font-size="16" fill="#444">
    <text x="360" y="40" text-anchor="middle">f represents 0 over Q iff f represents 0 over every Q_v</text>
    <text x="360" y="350" text-anchor="middle">one global solvability question becomes a finite set of local checks</text>
  </g>
</svg>
