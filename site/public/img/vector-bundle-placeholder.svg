<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 960 420" role="img" aria-labelledby="title desc">
  <title id="title">Vector bundle fibers</title>
  <desc id="desc">A curved base with vector planes attached above points and local product coordinates.</desc>
  <rect width="960" height="420" fill="#f8fafc"/>
  <path d="M80 305 C210 215 345 350 470 280 C615 198 735 330 885 245 L885 350 L80 350 Z" fill="#dcfce7" stroke="#15803d" stroke-width="4"/>
  <g stroke="#475569" stroke-width="3" opacity="0.7">
    <path d="M210 252 V105"/>
    <path d="M365 300 V135"/>
    <path d="M520 258 V82"/>
    <path d="M690 292 V125"/>
  </g>
  <g fill="#ffffff" stroke="#2563eb" stroke-width="4">
    <path d="M155 115 L265 75 L300 135 L190 175 Z"/>
    <path d="M310 145 L420 105 L455 165 L345 205 Z"/>
    <path d="M465 92 L575 52 L610 112 L500 152 Z"/>
    <path d="M635 135 L745 95 L780 155 L670 195 Z"/>
  </g>
  <g stroke="#7c3aed" stroke-width="4" marker-end="url(#vb-arrow)" fill="none" stroke-linecap="round">
    <defs>
      <marker id="vb-arrow" markerWidth="10" markerHeight="10" refX="8" refY="5" orient="auto">
        <path d="M1 1 L9 5 L1 9 Z" fill="#7c3aed"/>
      </marker>
    </defs>
    <path d="M205 132 L250 113"/>
    <path d="M360 165 L407 145"/>
    <path d="M515 112 L565 91"/>
    <path d="M685 155 L730 136"/>
  </g>
  <rect x="125" y="58" width="560" height="242" rx="8" fill="none" stroke="#dc2626" stroke-width="4" stroke-dasharray="13 9"/>
  <g font-family="Inter, Arial, sans-serif" fill="#0f172a">
    <text x="82" y="49" font-size="30" font-weight="700">a vector space over each point</text>
    <text x="710" y="88" font-size="20" font-weight="700" fill="#dc2626">local product chart</text>
    <text x="124" y="382" font-size="19">base space</text>
    <text x="700" y="214" font-size="19">fibers carry vector-space operations</text>
  </g>
</svg>
