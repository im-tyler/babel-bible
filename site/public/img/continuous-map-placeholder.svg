<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 720 360" role="img" aria-labelledby="title desc">
  <title id="title">Continuous map and open preimage</title>
  <desc id="desc">A map from one blob to another pulls an open region in the target back to an open region in the source.</desc>
  <rect width="720" height="360" fill="#f7f7f2"/>
  <ellipse cx="190" cy="190" rx="130" ry="90" fill="#d6e6f2" stroke="#2f5873" stroke-width="3"/>
  <ellipse cx="535" cy="190" rx="130" ry="90" fill="#f1dfc4" stroke="#7a5a24" stroke-width="3"/>
  <ellipse cx="170" cy="175" rx="48" ry="32" fill="#d9ead3" stroke="#315f3c" stroke-width="2"/>
  <ellipse cx="560" cy="165" rx="54" ry="36" fill="#d9ead3" stroke="#315f3c" stroke-width="2"/>
  <path d="M325 190 H392" stroke="#333" stroke-width="4" marker-end="url(#arrow)"/>
  <path d="M508 128 C420 60 260 75 198 139" fill="none" stroke="#315f3c" stroke-width="3" stroke-dasharray="7 7" marker-end="url(#arrow-green)"/>
  <text x="352" y="172" font-family="Arial, sans-serif" font-size="24" fill="#333">f</text>
  <text x="120" y="300" font-family="Arial, sans-serif" font-size="20" fill="#193143">source</text>
  <text x="488" y="300" font-family="Arial, sans-serif" font-size="20" fill="#463414">target</text>
  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#333"/>
    </marker>
    <marker id="arrow-green" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#315f3c"/>
    </marker>
  </defs>
</svg>
