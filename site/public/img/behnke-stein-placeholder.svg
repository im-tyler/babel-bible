<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 720 360" role="img" aria-labelledby="title desc">
  <title id="title">Behnke-Stein theorem</title>
  <desc id="desc">A schematic placeholder showing a non-compact Riemann surface with a nested Runge exhaustion, a strictly subharmonic exhaustion shown as level curves, and an arrow labelled "non-compact implies Stein".</desc>
  <rect width="720" height="360" fill="#f4f4ec"/>
  <g fill="none" stroke="#5a3d6f" stroke-width="6">
    <path d="M60 200 Q200 70 360 200 Q520 330 660 200"/>
  </g>
  <g fill="none" stroke="#3a6f5a" stroke-width="2">
    <ellipse cx="360" cy="200" rx="50" ry="32"/>
    <ellipse cx="360" cy="200" rx="100" ry="55"/>
    <ellipse cx="360" cy="200" rx="160" ry="80"/>
    <ellipse cx="360" cy="200" rx="220" ry="105"/>
  </g>
  <g fill="#d68a3a">
    <circle cx="360" cy="200" r="6"/>
  </g>
  <g fill="none" stroke="#d68a3a" stroke-width="3" stroke-dasharray="6 4">
    <path d="M360 60 L360 165"/>
  </g>
  <g fill="#d68a3a">
    <polygon points="354,165 366,165 360,178"/>
  </g>
  <g font-family="Inter, Arial, sans-serif" fill="#222">
    <text x="360" y="50" text-anchor="middle" font-size="20">strictly subharmonic exhaustion</text>
    <text x="100" y="100" font-size="18">non-compact RS X</text>
    <text x="620" y="320" text-anchor="end" font-size="18">Runge exhaustion X_n</text>
    <text x="360" y="345" text-anchor="middle" font-size="22">Behnke-Stein: non-compact implies Stein</text>
  </g>
</svg>
