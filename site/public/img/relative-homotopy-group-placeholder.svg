<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 720 360" role="img" aria-labelledby="title desc">
  <title id="title">Relative homotopy group</title>
  <desc id="desc">A schematic placeholder diagram: a disk whose rim maps into a subspace A inside a larger space X, with one rim point pinned to the basepoint.</desc>
  <rect width="720" height="360" fill="#f6f1e7"/>
  <ellipse cx="360" cy="180" rx="300" ry="130" fill="none" stroke="#2d5a3d" stroke-width="6"/>
  <ellipse cx="360" cy="180" rx="170" ry="80" fill="#dfe9df" stroke="#8a4a8a" stroke-width="3"/>
  <circle cx="360" cy="180" r="55" fill="none" stroke="#8a4a8a" stroke-width="6"/>
  <circle cx="360" cy="180" r="55" fill="#8a4a8a" fill-opacity="0.12"/>
  <circle cx="305" cy="180" r="9" fill="#2d5a3d"/>
  <text x="312" y="172" font-family="Inter, Arial, sans-serif" font-size="20" fill="#222">x_0</text>
  <text x="560" y="100" font-family="Inter, Arial, sans-serif" font-size="26" fill="#2d5a3d">X</text>
  <text x="360" y="120" text-anchor="middle" font-family="Inter, Arial, sans-serif" font-size="24" fill="#8a4a8a">A</text>
  <text x="360" y="186" text-anchor="middle" font-family="Inter, Arial, sans-serif" font-size="20" fill="#222">D^n</text>
  <text x="360" y="335" text-anchor="middle" font-family="Inter, Arial, sans-serif" font-size="28" fill="#222">Relative homotopy group</text>
</svg>
