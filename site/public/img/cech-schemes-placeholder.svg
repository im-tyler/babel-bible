<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 720 360" role="img" aria-labelledby="title desc">
  <title id="title">Cech cohomology of sheaves on schemes</title>
  <desc id="desc">A schematic placeholder showing an open cover of a scheme with overlap intersections carrying sheaf data.</desc>
  <rect width="720" height="360" fill="#f6f1e7"/>
  <g fill="none" stroke-width="6">
    <circle cx="240" cy="180" r="120" stroke="#2d5a3d" opacity="0.75"/>
    <circle cx="380" cy="180" r="120" stroke="#8a4a8a" opacity="0.75"/>
    <circle cx="520" cy="180" r="120" stroke="#b8742a" opacity="0.75"/>
  </g>
  <g fill="#222" font-family="Inter, Arial, sans-serif" font-size="22" text-anchor="middle">
    <text x="180" y="184">U_0</text>
    <text x="380" y="120">U_1</text>
    <text x="580" y="184">U_2</text>
    <text x="310" y="200">U_01</text>
    <text x="450" y="200">U_12</text>
    <text x="380" y="232">U_012</text>
  </g>
  <text x="360" y="325" text-anchor="middle" font-family="Inter, Arial, sans-serif" font-size="26" fill="#222">Open cover with intersections carrying sheaf sections</text>
</svg>
