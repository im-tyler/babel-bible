<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 720 360" role="img" aria-labelledby="title desc">
  <title id="title">Stable homotopy by suspension</title>
  <desc id="desc">A sequence of spaces connected by suspension arrows eventually enters a stable repeating region.</desc>
  <rect width="720" height="360" fill="#f7f7f2"/>
  <circle cx="95" cy="180" r="28" fill="none" stroke="#2f5873" stroke-width="4"/>
  <circle cx="225" cy="180" r="44" fill="none" stroke="#2f5873" stroke-width="4"/>
  <circle cx="380" cy="180" r="60" fill="none" stroke="#2f5873" stroke-width="4"/>
  <rect x="520" y="112" width="130" height="136" rx="12" fill="#d9ead3" stroke="#315f3c" stroke-width="3"/>
  <text x="548" y="185" font-family="Arial, sans-serif" font-size="22" fill="#1d2b1f">stable</text>
  <path d="M130 180 H172" stroke="#333" stroke-width="3" marker-end="url(#arrow)"/>
  <path d="M275 180 H318" stroke="#333" stroke-width="3" marker-end="url(#arrow)"/>
  <path d="M448 180 H505" stroke="#333" stroke-width="3" marker-end="url(#arrow)"/>
  <text x="147" y="160" font-family="Arial, sans-serif" font-size="18" fill="#333">suspend</text>
  <text x="286" y="160" font-family="Arial, sans-serif" font-size="18" fill="#333">suspend</text>
  <text x="455" y="160" font-family="Arial, sans-serif" font-size="18" fill="#333">repeat</text>
  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#333"/>
    </marker>
  </defs>
</svg>
