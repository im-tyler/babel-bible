<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 720 360" role="img" aria-labelledby="title desc">
  <title id="title">Infinite-dimensional representation tower</title>
  <desc id="desc">A tower of state levels with symmetry arrows and a central scalar label.</desc>
  <rect width="720" height="360" fill="#f7f7f2"/>
  <g fill="#d6e6f2" stroke="#2f5873" stroke-width="2">
    <rect x="130" y="260" width="460" height="34" rx="6"/>
    <rect x="170" y="208" width="380" height="34" rx="6"/>
    <rect x="210" y="156" width="300" height="34" rx="6"/>
    <rect x="250" y="104" width="220" height="34" rx="6"/>
    <rect x="290" y="52" width="140" height="34" rx="6"/>
  </g>
  <text x="610" y="284" font-family="Arial, sans-serif" font-size="18" fill="#333">level 0</text>
  <text x="610" y="232" font-family="Arial, sans-serif" font-size="18" fill="#333">level 1</text>
  <text x="610" y="180" font-family="Arial, sans-serif" font-size="18" fill="#333">level 2</text>
  <path d="M350 244 V198" stroke="#7a5a24" stroke-width="4" marker-end="url(#arrow)"/>
  <path d="M390 146 V96" stroke="#7a5a24" stroke-width="4" marker-end="url(#arrow)"/>
  <circle cx="96" cy="82" r="35" fill="#f1dfc4" stroke="#7a5a24" stroke-width="2"/>
  <text x="83" y="89" font-family="Arial, sans-serif" font-size="24" fill="#463414">c</text>
  <text x="64" y="135" font-family="Arial, sans-serif" font-size="18" fill="#463414">central scalar</text>
  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#7a5a24"/>
    </marker>
  </defs>
</svg>
