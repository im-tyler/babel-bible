<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 500" width="800" height="500">
  <rect width="800" height="500" fill="#f8f8f8"/>
  <text x="400" y="30" text-anchor="middle" font-family="sans-serif" font-size="16" fill="#333">Stellar Structure — Placeholder</text>

  <!-- Star cross-section -->
  <circle cx="240" cy="270" r="165" fill="#ffe0b2" stroke="#fb8c00" stroke-width="2"/>
  <circle cx="240" cy="270" r="110" fill="#ffcc80" stroke="#fb8c00" stroke-width="1.5"/>
  <circle cx="240" cy="270" r="55" fill="#ef5350" stroke="#c62828" stroke-width="2"/>

  <!-- Zone labels -->
  <text x="240" y="274" text-anchor="middle" font-family="sans-serif" font-size="12" fill="#fff">Core</text>
  <text x="240" y="288" text-anchor="middle" font-family="sans-serif" font-size="9" fill="#fff">PP chain / CNO</text>
  <text x="240" y="180" text-anchor="middle" font-family="sans-serif" font-size="11" fill="#5d4037">Radiative zone</text>
  <text x="240" y="415" text-anchor="middle" font-family="sans-serif" font-size="11" fill="#5d4037">Convective zone</text>

  <!-- Hydrostatic equilibrium arrows: gravity inward, pressure outward -->
  <line x1="240" y1="95" x2="240" y2="130" stroke="#1565c0" stroke-width="2" marker-end="url(#arrowBlue)"/>
  <text x="250" y="112" font-family="sans-serif" font-size="10" fill="#1565c0">gravity</text>
  <line x1="240" y1="445" x2="240" y2="410" stroke="#c62828" stroke-width="2" marker-end="url(#arrowRed)"/>
  <text x="250" y="440" font-family="sans-serif" font-size="10" fill="#c62828">pressure</text>

  <defs>
    <marker id="arrowBlue" markerWidth="8" markerHeight="8" refX="6" refY="4" orient="auto">
      <path d="M0,0 L8,4 L0,8 z" fill="#1565c0"/>
    </marker>
    <marker id="arrowRed" markerWidth="8" markerHeight="8" refX="6" refY="4" orient="auto">
      <path d="M0,0 L8,4 L0,8 z" fill="#c62828"/>
    </marker>
  </defs>

  <!-- Inset: energy generation rate vs temperature -->
  <rect x="470" y="70" width="300" height="180" rx="4" fill="#fff" stroke="#bbb" stroke-width="1"/>
  <text x="620" y="90" text-anchor="middle" font-family="sans-serif" font-size="11" fill="#555">Energy generation ε vs core temperature T</text>
  <line x1="500" y1="230" x2="750" y2="230" stroke="#999" stroke-width="1"/>
  <line x1="500" y1="230" x2="500" y2="105" stroke="#999" stroke-width="1"/>
  <text x="745" y="245" text-anchor="end" font-family="sans-serif" font-size="10" fill="#666">T →</text>
  <text x="492" y="112" text-anchor="end" font-family="sans-serif" font-size="10" fill="#666">ε</text>
  <path d="M500,228 C560,224 620,210 740,150" stroke="#42a5f5" stroke-width="2" fill="none"/>
  <text x="700" y="170" font-family="sans-serif" font-size="10" fill="#1565c0">CNO (ε ∝ T^17)</text>
  <path d="M500,229 C580,226 670,216 745,205" stroke="#ef5350" stroke-width="2" fill="none"/>
  <text x="650" y="208" font-family="sans-serif" font-size="10" fill="#c62828">PP (ε ∝ T^4)</text>

  <!-- Inset: timescales -->
  <rect x="470" y="270" width="300" height="190" rx="4" fill="#fff" stroke="#bbb" stroke-width="1"/>
  <text x="620" y="290" text-anchor="middle" font-family="sans-serif" font-size="11" fill="#555">Stellar timescales (Sun)</text>
  <text x="485" y="315" font-family="sans-serif" font-size="11" fill="#444">Dynamical</text>
  <text x="745" y="315" text-anchor="end" font-family="sans-serif" font-size="11" fill="#444">~1 hour</text>
  <text x="485" y="340" font-family="sans-serif" font-size="11" fill="#444">Kelvin-Helmholtz (thermal)</text>
  <text x="745" y="340" text-anchor="end" font-family="sans-serif" font-size="11" fill="#444">~3 × 10^7 yr</text>
  <text x="485" y="365" font-family="sans-serif" font-size="11" fill="#444">Nuclear (H burning)</text>
  <text x="745" y="365" text-anchor="end" font-family="sans-serif" font-size="11" fill="#444">~10^10 yr</text>
  <line x1="485" y1="380" x2="745" y2="380" stroke="#ddd" stroke-width="1"/>
  <text x="620" y="402" text-anchor="middle" font-family="sans-serif" font-size="10" fill="#666">Each successive timescale is</text>
  <text x="620" y="416" text-anchor="middle" font-family="sans-serif" font-size="10" fill="#666">many orders of magnitude longer.</text>
  <text x="620" y="442" text-anchor="middle" font-family="sans-serif" font-size="10" fill="#888">28.02.02</text>
</svg>
