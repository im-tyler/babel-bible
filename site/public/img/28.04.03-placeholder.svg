<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 500" width="800" height="500">
  <rect width="800" height="500" fill="#f8f8f8"/>
  <text x="400" y="30" text-anchor="middle" font-family="sans-serif" font-size="16" fill="#333">Cosmic Microwave Background — Placeholder</text>

  <!-- Main panel: angular power spectrum D_l vs multipole l -->
  <rect x="80" y="60" width="370" height="380" rx="4" fill="#fff" stroke="#bbb" stroke-width="1"/>
  <text x="265" y="80" text-anchor="middle" font-family="sans-serif" font-size="11" fill="#555">Angular power spectrum D_l = l(l+1) C_l / 2pi</text>

  <!-- Axes -->
  <line x1="100" y1="420" x2="440" y2="420" stroke="#999" stroke-width="1"/>
  <line x1="100" y1="90" x2="100" y2="420" stroke="#999" stroke-width="1"/>
  <text x="270" y="455" text-anchor="middle" font-family="sans-serif" font-size="11" fill="#666">multipole l  →</text>
  <text x="88" y="250" text-anchor="middle" font-family="sans-serif" font-size="11" fill="#666" transform="rotate(-90 88 250)">D_l  (uK^2)</text>

  <!-- Axis ticks -->
  <text x="100" y="435" text-anchor="middle" font-family="sans-serif" font-size="9" fill="#888">0</text>
  <text x="151" y="435" text-anchor="middle" font-family="sans-serif" font-size="9" fill="#888">300</text>
  <text x="219" y="435" text-anchor="middle" font-family="sans-serif" font-size="9" fill="#888">700</text>
  <text x="304" y="435" text-anchor="middle" font-family="sans-serif" font-size="9" fill="#888">1200</text>
  <text x="406" y="435" text-anchor="middle" font-family="sans-serif" font-size="9" fill="#888">1800</text>

  <!-- Sachs-Wolfe plateau (low-l flat region) -->
  <path d="M100,365 Q110,365 120,365 T140,360" stroke="#1565c0" stroke-width="1.5" fill="none" stroke-dasharray="4 3" opacity="0.6"/>
  <text x="108" y="358" font-family="sans-serif" font-size="9" fill="#1565c0">Sachs-Wolfe</text>

  <!-- Acoustic peak spectrum curve -->
  <path d="M100,365
           C120,363 130,355 137,108
           C148,150 152,272 156,278
           C176,288 186,158 192,146
           C202,150 206,282 211,284
           C226,286 231,188 238,184
           C258,180 264,256 270,256
           C286,262 296,312 305,312
           C330,332 350,366 356,366
           C382,376 400,398 406,398
           L440,409"
        stroke="#c62828" stroke-width="2.2" fill="none" stroke-linejoin="round"/>

  <!-- Peak markers and labels -->
  <circle cx="137" cy="108" r="3" fill="#c62828"/>
  <text x="143" y="104" font-family="sans-serif" font-size="10" fill="#c62828">first peak (l ~ 220)</text>
  <circle cx="192" cy="146" r="3" fill="#c62828"/>
  <text x="198" y="144" font-family="sans-serif" font-size="9" fill="#888">2nd</text>
  <circle cx="238" cy="184" r="3" fill="#c62828"/>
  <text x="244" y="184" font-family="sans-serif" font-size="9" fill="#888">3rd</text>

  <!-- Silk damping annotation -->
  <text x="350" y="390" font-family="sans-serif" font-size="9" fill="#6a1b9a">Silk damping</text>
  <line x1="382" y1="385" x2="402" y2="395" stroke="#6a1b9a" stroke-width="1" opacity="0.7"/>

  <!-- Sound-horizon annotation -->
  <text x="120" y="200" font-family="sans-serif" font-size="9" fill="#555">peak spacing =</text>
  <text x="120" y="212" font-family="sans-serif" font-size="9" fill="#555">sound horizon r_s</text>

  <!-- Inset top-right: schematic CMB sky map -->
  <rect x="470" y="60" width="300" height="180" rx="4" fill="#fff" stroke="#bbb" stroke-width="1"/>
  <text x="620" y="80" text-anchor="middle" font-family="sans-serif" font-size="11" fill="#555">Temperature anisotropy map (schematic)</text>
  <!-- Sky circle -->
  <circle cx="620" cy="155" r="68" fill="#e3e3e3" stroke="#999" stroke-width="1"/>
  <!-- Hot/cold mottled patches -->
  <g opacity="0.85">
    <circle cx="598" cy="135" r="14" fill="#ef5350" opacity="0.55"/>
    <circle cx="640" cy="148" r="11" fill="#c62828" opacity="0.45"/>
    <circle cx="608" cy="172" r="13" fill="#42a5f5" opacity="0.5"/>
    <circle cx="648" cy="180" r="10" fill="#1565c0" opacity="0.5"/>
    <circle cx="582" cy="160" r="9" fill="#ef5350" opacity="0.4"/>
    <circle cx="625" cy="118" r="8" fill="#90caf9" opacity="0.5"/>
    <circle cx="666" cy="165" r="9" fill="#ef5350" opacity="0.35"/>
    <circle cx="600" cy="195" r="8" fill="#90caf9" opacity="0.45"/>
    <circle cx="630" cy="200" r="7" fill="#ef5350" opacity="0.4"/>
    <circle cx="565" cy="148" r="7" fill="#42a5f5" opacity="0.4"/>
  </g>
  <text x="540" y="232" font-family="sans-serif" font-size="9" fill="#c62828">+ hot</text>
  <text x="690" y="232" font-family="sans-serif" font-size="9" fill="#1565c0">cold -</text>
  <text x="620" y="232" text-anchor="middle" font-family="sans-serif" font-size="9" fill="#888">|Delta T / T| ~ 10^-5</text>

  <!-- Inset bottom-right: LCDM parameters -->
  <rect x="470" y="260" width="300" height="200" rx="4" fill="#fff" stroke="#bbb" stroke-width="1"/>
  <text x="620" y="280" text-anchor="middle" font-family="sans-serif" font-size="11" fill="#555">Planck 2018 LCDM parameters</text>
  <text x="485" y="305" font-family="sans-serif" font-size="11" fill="#444">H_0</text>
  <text x="755" y="305" text-anchor="end" font-family="sans-serif" font-size="11" fill="#444">67.36 km/s/Mpc</text>
  <text x="485" y="325" font-family="sans-serif" font-size="11" fill="#444">Omega_m</text>
  <text x="755" y="325" text-anchor="end" font-family="sans-serif" font-size="11" fill="#444">0.315</text>
  <text x="485" y="345" font-family="sans-serif" font-size="11" fill="#444">Omega_Lambda</text>
  <text x="755" y="345" text-anchor="end" font-family="sans-serif" font-size="11" fill="#444">0.685</text>
  <text x="485" y="365" font-family="sans-serif" font-size="11" fill="#444">Omega_b h^2</text>
  <text x="755" y="365" text-anchor="end" font-family="sans-serif" font-size="11" fill="#444">0.02233</text>
  <text x="485" y="385" font-family="sans-serif" font-size="11" fill="#444">Omega_k</text>
  <text x="755" y="385" text-anchor="end" font-family="sans-serif" font-size="11" fill="#444">0.0007 (flat)</text>
  <text x="485" y="405" font-family="sans-serif" font-size="11" fill="#444">n_s</text>
  <text x="755" y="405" text-anchor="end" font-family="sans-serif" font-size="11" fill="#444">0.965</text>
  <text x="485" y="425" font-family="sans-serif" font-size="11" fill="#444">sigma_8</text>
  <text x="755" y="425" text-anchor="end" font-family="sans-serif" font-size="11" fill="#444">0.811</text>
  <line x1="485" y1="435" x2="755" y2="435" stroke="#ddd" stroke-width="1"/>
  <text x="620" y="452" text-anchor="middle" font-family="sans-serif" font-size="9" fill="#888">28.04.03</text>
</svg>
