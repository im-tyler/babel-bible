<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 720 360" role="img" aria-labelledby="title desc">
  <title id="title">Crossing symmetry and CPT</title>
  <desc id="desc">Two Feynman diagrams side by side illustrating crossing symmetry: electron-electron scattering on the left and electron-positron annihilation on the right, sharing the same internal photon-exchange structure with one external line crossed and relabelled.</desc>
  <rect width="720" height="360" fill="#f4f4ec"/>
  <g stroke="#5a3d6f" stroke-width="3" fill="none">
    <line x1="60" y1="80" x2="180" y2="160"/>
    <line x1="60" y1="280" x2="180" y2="200"/>
    <line x1="180" y1="160" x2="300" y2="80"/>
    <line x1="180" y1="200" x2="300" y2="280"/>
  </g>
  <path d="M180 160 Q210 180 180 200" fill="none" stroke="#d68a3a" stroke-width="3" stroke-dasharray="6 4"/>
  <g stroke="#5a3d6f" stroke-width="3" fill="none">
    <line x1="420" y1="80" x2="540" y2="160"/>
    <line x1="660" y1="80" x2="540" y2="200"/>
    <line x1="540" y1="160" x2="660" y2="280"/>
    <line x1="540" y1="200" x2="420" y2="280"/>
  </g>
  <path d="M540 160 Q570 180 540 200" fill="none" stroke="#d68a3a" stroke-width="3" stroke-dasharray="6 4"/>
  <g font-family="Inter, Arial, sans-serif" font-size="16" fill="#222">
    <text x="55" y="72" text-anchor="end">e-</text>
    <text x="55" y="292" text-anchor="end">e-</text>
    <text x="305" y="72">e-</text>
    <text x="305" y="292">e-</text>
    <text x="415" y="72" text-anchor="end">e-</text>
    <text x="415" y="292" text-anchor="end">e+</text>
    <text x="665" y="72">e+</text>
    <text x="665" y="292">e-</text>
  </g>
  <text x="180" y="335" text-anchor="middle" font-family="Inter, Arial, sans-serif" font-size="16" fill="#222">e- e- scattering</text>
  <text x="540" y="335" text-anchor="middle" font-family="Inter, Arial, sans-serif" font-size="16" fill="#222">e+ e- crossed channel</text>
  <text x="360" y="180" text-anchor="middle" font-family="Inter, Arial, sans-serif" font-size="22" fill="#5a3d6f">CPT</text>
</svg>
