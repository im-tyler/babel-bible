<svg xmlns="http://www.w3.org/2000/svg" width="900" height="460" viewBox="0 0 900 460" role="img" aria-labelledby="title desc">
  <title id="title">Principal connection as horizontal directions</title>
  <desc id="desc">A principal connection chooses horizontal directions in the total space of a principal bundle, complementary to vertical group-orbit directions.</desc>
  <rect width="900" height="460" fill="#f8fafc"/>
  <path d="M120 338 C250 268 360 330 480 270 C610 205 720 255 800 215 L800 385 L120 385 Z" fill="#e0f2fe" stroke="#0284c7" stroke-width="4"/>
  <path d="M175 317 C285 280 390 303 500 255 C615 205 710 226 770 212" fill="none" stroke="#1d4ed8" stroke-width="6" stroke-linecap="round"/>
  <g transform="translate(255 268)">
    <ellipse cx="0" cy="0" rx="34" ry="72" fill="#ffffff" stroke="#475569" stroke-width="4"/>
    <path d="M0 54 C20 28 21 -28 0 -54 C-20 -28 -20 28 0 54" fill="none" stroke="#64748b" stroke-width="3"/>
    <line x1="-70" y1="-22" x2="72" y2="-42" stroke="#16a34a" stroke-width="6" stroke-linecap="round"/>
    <line x1="0" y1="60" x2="0" y2="-65" stroke="#dc2626" stroke-width="5" stroke-linecap="round"/>
  </g>
  <g transform="translate(492 252)">
    <ellipse cx="0" cy="0" rx="34" ry="72" fill="#ffffff" stroke="#475569" stroke-width="4"/>
    <path d="M0 54 C20 28 21 -28 0 -54 C-20 -28 -20 28 0 54" fill="none" stroke="#64748b" stroke-width="3"/>
    <line x1="-70" y1="-18" x2="72" y2="-38" stroke="#16a34a" stroke-width="6" stroke-linecap="round"/>
    <line x1="0" y1="60" x2="0" y2="-65" stroke="#dc2626" stroke-width="5" stroke-linecap="round"/>
  </g>
  <g transform="translate(690 220)">
    <ellipse cx="0" cy="0" rx="34" ry="72" fill="#ffffff" stroke="#475569" stroke-width="4"/>
    <path d="M0 54 C20 28 21 -28 0 -54 C-20 -28 -20 28 0 54" fill="none" stroke="#64748b" stroke-width="3"/>
    <line x1="-70" y1="-10" x2="72" y2="-30" stroke="#16a34a" stroke-width="6" stroke-linecap="round"/>
    <line x1="0" y1="60" x2="0" y2="-65" stroke="#dc2626" stroke-width="5" stroke-linecap="round"/>
  </g>
  <text x="450" y="58" text-anchor="middle" font-family="Inter, Arial, sans-serif" font-size="30" fill="#1f2933">horizontal directions in a principal bundle</text>
  <text x="256" y="134" text-anchor="middle" font-family="Inter, Arial, sans-serif" font-size="19" fill="#16a34a">horizontal</text>
  <text x="762" y="174" text-anchor="middle" font-family="Inter, Arial, sans-serif" font-size="19" fill="#dc2626">vertical group orbit</text>
  <text x="450" y="424" text-anchor="middle" font-family="Inter, Arial, sans-serif" font-size="22" fill="#475569">A connection splits motion into base motion and pure gauge motion.</text>
</svg>
