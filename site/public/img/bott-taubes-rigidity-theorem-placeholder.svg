<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 720 360" role="img" aria-labelledby="title desc">
  <title id="title">Bott-Taubes Rigidity Theorem</title>
  <desc id="desc">A schematic showing the equivariant Witten genus as a function on the upper half-plane crossed with the complex plane, with rigidity indicated by horizontal lines of constancy in the elliptic direction.</desc>
  <rect width="720" height="360" fill="#f7f7f2"/>
  <g stroke="#1f6f8b" stroke-width="2" fill="none">
    <line x1="60" y1="60" x2="60" y2="300"/>
    <line x1="60" y1="300" x2="660" y2="300"/>
  </g>
  <text x="40" y="60" font-family="Inter, Arial, sans-serif" font-size="16" fill="#222">q</text>
  <text x="660" y="325" font-family="Inter, Arial, sans-serif" font-size="16" fill="#222">t</text>
  <g stroke="#f2b134" stroke-width="6" stroke-linecap="round">
    <line x1="90" y1="100" x2="640" y2="100"/>
    <line x1="90" y1="160" x2="640" y2="160"/>
    <line x1="90" y1="220" x2="640" y2="220"/>
    <line x1="90" y1="280" x2="640" y2="280"/>
  </g>
  <g fill="#1f6f8b">
    <circle cx="90" cy="100" r="6"/>
    <circle cx="90" cy="160" r="6"/>
    <circle cx="90" cy="220" r="6"/>
    <circle cx="90" cy="280" r="6"/>
  </g>
  <text x="360" y="40" text-anchor="middle" font-family="Inter, Arial, sans-serif" font-size="18" fill="#222">Equivariant Witten genus is constant in t for each q</text>
  <text x="360" y="345" text-anchor="middle" font-family="Inter, Arial, sans-serif" font-size="14" fill="#555">Bott-Taubes rigidity: phi_W^{S^1}(M)(q, t) = phi_W(M)(q)</text>
</svg>
