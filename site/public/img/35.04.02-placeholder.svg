<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 500" width="800" height="500">
  <rect width="800" height="500" fill="#f8f8f8"/>
  <text x="400" y="30" text-anchor="middle" font-family="sans-serif" font-size="16" fill="#333">Macronutrient Metabolism — Placeholder</text>
  <rect x="50" y="50" width="220" height="120" rx="4" fill="#e3f2fd" stroke="#42a5f5" stroke-width="1.5"/>
  <text x="160" y="75" text-anchor="middle" font-family="sans-serif" font-size="13" fill="#1565c0">Carbohydrates</text>
  <text x="160" y="98" text-anchor="middle" font-family="sans-serif" font-size="11" fill="#555">glucose -> pyruvate -></text>
  <text x="160" y="113" text-anchor="middle" font-family="sans-serif" font-size="11" fill="#555">acetyl-CoA -> Krebs</text>
  <text x="160" y="135" text-anchor="middle" font-family="sans-serif" font-size="11" fill="#555">~32 ATP / glucose</text>
  <text x="160" y="155" text-anchor="middle" font-family="sans-serif" font-size="10" fill="#888">glycogen store</text>
  <rect x="290" y="50" width="220" height="120" rx="4" fill="#fff3e0" stroke="#ff9800" stroke-width="1.5"/>
  <text x="400" y="75" text-anchor="middle" font-family="sans-serif" font-size="13" fill="#e65100">Fats</text>
  <text x="400" y="98" text-anchor="middle" font-family="sans-serif" font-size="11" fill="#555">fatty acyl-CoA -></text>
  <text x="400" y="113" text-anchor="middle" font-family="sans-serif" font-size="11" fill="#555">beta-oxidation -></text>
  <text x="400" y="135" text-anchor="middle" font-family="sans-serif" font-size="11" fill="#555">acetyl-CoA -> Krebs</text>
  <text x="400" y="155" text-anchor="middle" font-family="sans-serif" font-size="10" fill="#888">~106 ATP / palmitate</text>
  <rect x="530" y="50" width="220" height="120" rx="4" fill="#fce4ec" stroke="#ec407a" stroke-width="1.5"/>
  <text x="640" y="75" text-anchor="middle" font-family="sans-serif" font-size="13" fill="#ad1457">Proteins</text>
  <text x="640" y="98" text-anchor="middle" font-family="sans-serif" font-size="11" fill="#555">amino acids -></text>
  <text x="640" y="113" text-anchor="middle" font-family="sans-serif" font-size="11" fill="#555">transamination -></text>
  <text x="640" y="135" text-anchor="middle" font-family="sans-serif" font-size="11" fill="#555">urea cycle (NH3 detox)</text>
  <text x="640" y="155" text-anchor="middle" font-family="sans-serif" font-size="10" fill="#888">gluconeogenesis (fasting)</text>
  <rect x="200" y="210" width="400" height="80" rx="6" fill="#ede7f6" stroke="#5e35b1" stroke-width="1.5"/>
  <text x="400" y="235" text-anchor="middle" font-family="sans-serif" font-size="13" fill="#4527a0">Common convergence: acetyl-CoA -> TCA cycle -> ETC</text>
  <text x="400" y="258" text-anchor="middle" font-family="sans-serif" font-size="11" fill="#555">mitochondrial oxidative phosphorylation</text>
  <text x="400" y="278" text-anchor="middle" font-family="sans-serif" font-size="11" fill="#555">NADH / FADH2 -> ATP</text>
  <line x1="160" y1="170" x2="300" y2="210" stroke="#42a5f5" stroke-width="1.5"/>
  <line x1="400" y1="170" x2="400" y2="210" stroke="#ff9800" stroke-width="1.5"/>
  <line x1="640" y1="170" x2="500" y2="210" stroke="#ec407a" stroke-width="1.5"/>
  <rect x="50" y="320" width="700" height="150" rx="4" fill="#fff" stroke="#bbb" stroke-width="1"/>
  <text x="400" y="345" text-anchor="middle" font-family="sans-serif" font-size="13" fill="#555">Energy balance: E_stored = E_intake - E_expenditure</text>
  <rect x="90" y="365" width="180" height="40" rx="3" fill="#c8e6c9" stroke="#43a047" stroke-width="1"/>
  <text x="180" y="390" text-anchor="middle" font-family="sans-serif" font-size="11" fill="#1b5e20">Fed: insulin dominant</text>
  <rect x="310" y="365" width="180" height="40" rx="3" fill="#ffe0b2" stroke="#fb8c00" stroke-width="1"/>
  <text x="400" y="390" text-anchor="middle" font-family="sans-serif" font-size="11" fill="#e65100">Fasting: glucagon dominant</text>
  <rect x="530" y="365" width="180" height="40" rx="3" fill="#ffcdd2" stroke="#e53935" stroke-width="1"/>
  <text x="620" y="390" text-anchor="middle" font-family="sans-serif" font-size="11" fill="#b71c1c">Starvation: ketogenesis</text>
  <text x="400" y="435" text-anchor="middle" font-family="sans-serif" font-size="11" fill="#666">BMR (~60-75%) + TEF (~10%) + activity (15-30%) = expenditure</text>
  <text x="400" y="455" text-anchor="middle" font-family="sans-serif" font-size="10" fill="#888">4 kcal/g carbs, 4 kcal/g protein, 9 kcal/g fat (Atwater factors)</text>
</svg>
