<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 720 360" role="img" aria-labelledby="title desc">
  <title id="title">Korteweg-Madelung Quantum Hydrodynamics</title>
  <desc id="desc">A schematic placeholder diagram showing the Madelung transform splitting a complex wavefunction into a density-and-phase fluid description with a quantum-pressure correction.</desc>
  <rect width="720" height="360" fill="#f6f1e7"/>
  <g stroke="#2d5a3d" stroke-width="3" fill="none">
    <path d="M 60 200 Q 180 60 300 200 T 540 200 T 660 200" />
  </g>
  <g stroke="#8a4a8a" stroke-width="2" stroke-dasharray="6 6" fill="none">
    <path d="M 60 240 Q 180 320 300 240 T 540 240 T 660 240" />
  </g>
  <circle cx="180" cy="120" r="6" fill="#2d5a3d"/>
  <circle cx="420" cy="160" r="6" fill="#2d5a3d"/>
  <circle cx="540" cy="200" r="6" fill="#2d5a3d"/>
  <text x="80" y="50" font-family="Inter, Arial, sans-serif" font-size="20" fill="#222">psi = sqrt(rho) e^(iS/h)</text>
  <text x="80" y="290" font-family="Inter, Arial, sans-serif" font-size="16" fill="#2d5a3d">rho (density)</text>
  <text x="80" y="320" font-family="Inter, Arial, sans-serif" font-size="16" fill="#8a4a8a">v = grad S / m (velocity)</text>
  <text x="360" y="345" text-anchor="middle" font-family="Inter, Arial, sans-serif" font-size="22" fill="#222">Korteweg-Madelung Quantum Hydrodynamics</text>
</svg>
