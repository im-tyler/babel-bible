<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 720 360" role="img" aria-labelledby="title desc">
  <title id="title">Linear equations and the line</title>
  <desc id="desc">A schematic placeholder diagram showing two straight lines on a coordinate grid, one rising and one falling, meeting at a single marked intersection point with axes labelled.</desc>
  <rect width="720" height="360" fill="#f4f4ec"/>
  <!-- Grid -->
  <g stroke="#d8d4c4" stroke-width="1">
    <line x1="60" y1="60" x2="660" y2="60"/>
    <line x1="60" y1="120" x2="660" y2="120"/>
    <line x1="60" y1="180" x2="660" y2="180"/>
    <line x1="60" y1="240" x2="660" y2="240"/>
    <line x1="60" y1="300" x2="660" y2="300"/>
    <line x1="120" y1="40" x2="120" y2="320"/>
    <line x1="240" y1="40" x2="240" y2="320"/>
    <line x1="360" y1="40" x2="360" y2="320"/>
    <line x1="480" y1="40" x2="480" y2="320"/>
    <line x1="600" y1="40" x2="600" y2="340"/>
  </g>
  <!-- Axes -->
  <line x1="60" y1="240" x2="700" y2="240" stroke="#222" stroke-width="2"/>
  <line x1="360" y1="20" x2="360" y2="340" stroke="#222" stroke-width="2"/>
  <text x="690" y="232" font-family="Inter, Arial, sans-serif" font-size="16" fill="#222">x</text>
  <text x="368" y="32" font-family="Inter, Arial, sans-serif" font-size="16" fill="#222">y</text>
  <!-- Rising line: y = (1/2)x + 1, slope 1/2 through (0,1) -->
  <line x1="60" y1="270" x2="660" y2="120" stroke="#5a3d6f" stroke-width="5" stroke-linecap="round"/>
  <text x="80" y="290" font-family="Inter, Arial, sans-serif" font-size="16" fill="#5a3d6f">y = (1/2)x + 1</text>
  <!-- Falling line: y = -x + 4 -->
  <line x1="120" y1="60" x2="600" y2="300" stroke="#d68a3a" stroke-width="5" stroke-linecap="round"/>
  <text x="500" y="100" font-family="Inter, Arial, sans-serif" font-size="16" fill="#d68a3a">y = −x + 4</text>
  <!-- Intersection point (2, 2): screen coords x = 360 + 2*60 = 480, y = 240 - 2*60 = 120 -->
  <circle cx="480" cy="180" r="7" fill="#a83232" stroke="#222" stroke-width="2"/>
  <text x="490" y="172" font-family="Inter, Arial, sans-serif" font-size="16" fill="#a83232">(2, 2)</text>
</svg>
