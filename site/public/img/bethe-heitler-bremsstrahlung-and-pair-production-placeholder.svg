<svg xmlns="http://www.w3.org/2000/svg" width="960" height="540" viewBox="0 0 960 540" role="img" aria-labelledby="title desc">
  <title id="title">Bethe-Heitler bremsstrahlung and pair production — tree diagrams, photon spectrum, radiation length</title>
  <desc id="desc">Two tree-level Feynman diagrams for bremsstrahlung electron plus nucleus to electron plus nucleus plus photon: a pre-emission diagram where the photon is radiated from the electron leg before the Coulomb scattering at the nucleus, and a post-emission diagram where the photon is radiated after the Coulomb scattering. The crossed process is pair production: photon plus nucleus to electron-positron pair plus nucleus, related by Feynman antiparticle-as-backward-going-electron crossing. The Bethe-Heitler differential cross section per photon energy, the radiation length formula, and the asymptotic seven-over-nine universality relation between bremsstrahlung and pair production are displayed. A schematic energy-loss plot shows exponential decay over a radiation length X_0, and a frequency-domain sketch shows LPM suppression at low omega in dense matter.</desc>
  <rect width="960" height="540" fill="#f8faf7"/>

  <defs>
    <marker id="fermarrow" markerWidth="10" markerHeight="10" refX="8" refY="5" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L8,5 L0,10 z" fill="#264653"/>
    </marker>
    <marker id="photarrow" markerWidth="10" markerHeight="10" refX="8" refY="5" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L8,5 L0,10 z" fill="#e76f51"/>
    </marker>
  </defs>

  <text x="480" y="34" text-anchor="middle" font-family="Arial, sans-serif" font-size="22" fill="#23424a" font-weight="bold">Bethe-Heitler bremsstrahlung and pair production</text>
  <text x="480" y="56" text-anchor="middle" font-family="Arial, sans-serif" font-size="13" fill="#23424a">e⁻(p) + N(Ze) → e⁻(p′) + γ(k) + N    ⟷  (crossing)  ⟷    γ(k) + N(Ze) → e⁺(p₊) + e⁻(p₋) + N</text>

  <!-- Diagram 1: pre-emission bremsstrahlung -->
  <text x="190" y="88" text-anchor="middle" font-family="Arial, sans-serif" font-size="15" fill="#23424a" font-weight="bold">Bremsstrahlung — pre-emission</text>
  <!-- incoming electron -->
  <line x1="50" y1="120" x2="140" y2="160" stroke="#264653" stroke-width="2.2" marker-end="url(#fermarrow)"/>
  <text x="50" y="110" text-anchor="middle" font-family="Arial, sans-serif" font-size="12" fill="#264653">e⁻ (p)</text>
  <!-- vertex 1 (photon emission) -->
  <circle cx="140" cy="160" r="3" fill="#23424a"/>
  <!-- emitted real photon -->
  <path d="M140 160 q10 -12 0 -24 q-10 -12 0 -24 q10 -12 0 -24" fill="none" stroke="#e76f51" stroke-width="2.2" marker-end="url(#photarrow)"/>
  <text x="115" y="100" text-anchor="middle" font-family="Arial, sans-serif" font-size="12" fill="#e76f51">γ (k, ω)</text>
  <!-- intermediate electron line -->
  <line x1="140" y1="160" x2="240" y2="200" stroke="#264653" stroke-width="2.2" marker-end="url(#fermarrow)"/>
  <text x="190" y="200" text-anchor="middle" font-family="Arial, sans-serif" font-size="11" fill="#8a8a8a">virtual e (p − k)</text>
  <!-- vertex 2 (Coulomb scattering at nucleus) -->
  <circle cx="240" cy="200" r="3" fill="#23424a"/>
  <!-- outgoing electron -->
  <line x1="240" y1="200" x2="340" y2="160" stroke="#264653" stroke-width="2.2" marker-end="url(#fermarrow)"/>
  <text x="345" y="155" text-anchor="middle" font-family="Arial, sans-serif" font-size="12" fill="#264653">e⁻ (p′)</text>
  <!-- Coulomb-photon to nucleus -->
  <path d="M240 200 q8 14 0 28 q-8 14 0 28 q8 14 0 28" fill="none" stroke="#2a9d8f" stroke-width="2.0" stroke-dasharray="3,3"/>
  <text x="200" y="270" text-anchor="middle" font-family="Arial, sans-serif" font-size="11" fill="#2a9d8f">γ* (Coulomb)</text>
  <!-- nucleus -->
  <circle cx="240" cy="290" r="9" fill="#a663cc" stroke="#23424a" stroke-width="1.5"/>
  <text x="240" y="312" text-anchor="middle" font-family="Arial, sans-serif" font-size="11" fill="#23424a">N (Ze)</text>

  <!-- Diagram 2: post-emission bremsstrahlung -->
  <text x="510" y="88" text-anchor="middle" font-family="Arial, sans-serif" font-size="15" fill="#23424a" font-weight="bold">Bremsstrahlung — post-emission</text>
  <!-- incoming electron -->
  <line x1="380" y1="160" x2="470" y2="200" stroke="#264653" stroke-width="2.2" marker-end="url(#fermarrow)"/>
  <text x="380" y="150" text-anchor="middle" font-family="Arial, sans-serif" font-size="12" fill="#264653">e⁻ (p)</text>
  <!-- vertex 1 (Coulomb scattering) -->
  <circle cx="470" cy="200" r="3" fill="#23424a"/>
  <!-- Coulomb-photon to nucleus -->
  <path d="M470 200 q8 14 0 28 q-8 14 0 28 q8 14 0 28" fill="none" stroke="#2a9d8f" stroke-width="2.0" stroke-dasharray="3,3"/>
  <text x="430" y="270" text-anchor="middle" font-family="Arial, sans-serif" font-size="11" fill="#2a9d8f">γ* (Coulomb)</text>
  <!-- nucleus -->
  <circle cx="470" cy="290" r="9" fill="#a663cc" stroke="#23424a" stroke-width="1.5"/>
  <text x="470" y="312" text-anchor="middle" font-family="Arial, sans-serif" font-size="11" fill="#23424a">N (Ze)</text>
  <!-- intermediate electron line -->
  <line x1="470" y1="200" x2="570" y2="160" stroke="#264653" stroke-width="2.2" marker-end="url(#fermarrow)"/>
  <text x="525" y="195" text-anchor="middle" font-family="Arial, sans-serif" font-size="11" fill="#8a8a8a">virtual e (p′ + k)</text>
  <!-- vertex 2 (photon emission) -->
  <circle cx="570" cy="160" r="3" fill="#23424a"/>
  <!-- emitted real photon -->
  <path d="M570 160 q10 -12 0 -24 q-10 -12 0 -24 q10 -12 0 -24" fill="none" stroke="#e76f51" stroke-width="2.2" marker-end="url(#photarrow)"/>
  <text x="600" y="100" text-anchor="middle" font-family="Arial, sans-serif" font-size="12" fill="#e76f51">γ (k, ω)</text>
  <!-- outgoing electron -->
  <line x1="570" y1="160" x2="670" y2="120" stroke="#264653" stroke-width="2.2" marker-end="url(#fermarrow)"/>
  <text x="675" y="115" text-anchor="middle" font-family="Arial, sans-serif" font-size="12" fill="#264653">e⁻ (p′)</text>

  <!-- Pair production crossing diagram -->
  <text x="830" y="88" text-anchor="middle" font-family="Arial, sans-serif" font-size="15" fill="#23424a" font-weight="bold">Pair production (crossing)</text>
  <!-- incoming photon -->
  <path d="M720 120 q10 12 0 24 q-10 12 0 24" fill="none" stroke="#e76f51" stroke-width="2.2" marker-end="url(#photarrow)"/>
  <text x="700" y="115" text-anchor="middle" font-family="Arial, sans-serif" font-size="12" fill="#e76f51">γ (E_γ &gt; 2m)</text>
  <!-- pair-creation vertex -->
  <circle cx="730" cy="180" r="3" fill="#23424a"/>
  <!-- outgoing positron (upward, with reversed arrow convention) -->
  <line x1="730" y1="180" x2="820" y2="140" stroke="#264653" stroke-width="2.2"/>
  <text x="835" y="135" text-anchor="middle" font-family="Arial, sans-serif" font-size="12" fill="#264653">e⁺ (p₊)</text>
  <!-- intermediate virtual electron -->
  <line x1="730" y1="180" x2="830" y2="220" stroke="#264653" stroke-width="2.2" marker-end="url(#fermarrow)"/>
  <text x="780" y="215" text-anchor="middle" font-family="Arial, sans-serif" font-size="11" fill="#8a8a8a">virtual e</text>
  <!-- Coulomb vertex -->
  <circle cx="830" cy="220" r="3" fill="#23424a"/>
  <!-- Coulomb photon to nucleus -->
  <path d="M830 220 q8 14 0 28 q-8 14 0 28 q8 14 0 28" fill="none" stroke="#2a9d8f" stroke-width="2.0" stroke-dasharray="3,3"/>
  <text x="870" y="265" text-anchor="middle" font-family="Arial, sans-serif" font-size="11" fill="#2a9d8f">γ* (Coulomb)</text>
  <!-- nucleus -->
  <circle cx="830" cy="310" r="9" fill="#a663cc" stroke="#23424a" stroke-width="1.5"/>
  <text x="830" y="332" text-anchor="middle" font-family="Arial, sans-serif" font-size="11" fill="#23424a">N (Ze)</text>
  <!-- outgoing electron -->
  <line x1="830" y1="220" x2="920" y2="180" stroke="#264653" stroke-width="2.2" marker-end="url(#fermarrow)"/>
  <text x="930" y="180" text-anchor="middle" font-family="Arial, sans-serif" font-size="12" fill="#264653">e⁻ (p₋)</text>

  <!-- Master formula box -->
  <rect x="40" y="350" width="880" height="148" fill="#ffffff" stroke="#23424a" stroke-width="1.2" rx="4"/>
  <text x="60" y="374" font-family="Arial, sans-serif" font-size="13" fill="#23424a" font-weight="bold">Bethe-Heitler bremsstrahlung spectrum (ultra-relativistic, screened):</text>
  <text x="60" y="394" font-family="Arial, sans-serif" font-size="13" fill="#23424a">dσ/dω = (4Z²α³/ω) · [4/3 − 4ω/(3E) + (ω/E)²] · log[183 Z^(−1/3) / (1 + ω/E)]</text>
  <text x="60" y="416" font-family="Arial, sans-serif" font-size="13" fill="#23424a">Radiation length:  X₀⁻¹ = 4 Z(Z+1) α³ (N_A ρ / A) · log(287/√Z) / m_e² c⁴</text>
  <text x="60" y="436" font-family="Arial, sans-serif" font-size="13" fill="#23424a">Pair-production high-energy asymptote (universality):  σ_pair → (7/9) σ_brems^∞</text>
  <text x="60" y="458" font-family="Arial, sans-serif" font-size="13" fill="#23424a">LPM suppression in dense matter:  bremsstrahlung at ω &lt; ω_LPM ∝ E²/X₀ suppressed by coherence loss</text>
  <text x="60" y="480" font-family="Arial, sans-serif" font-size="12" fill="#8a8a8a">Originators: Bethe-Heitler 1934 (Proc. Roy. Soc. A 146); Heitler 1954 §XII; Bloch-Nordsieck 1937 (IR); Landau-Pomeranchuk 1953 / Migdal 1956 (LPM); SLAC E-146 1995/1997 (LPM confirmation).</text>
</svg>
