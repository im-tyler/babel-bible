<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 960 420" role="img" aria-labelledby="title desc">
  <title id="title">Linear transformation, kernel, image, and rank-nullity</title>
  <desc id="desc">A three-dimensional domain space on the left mapped by a linear transformation to a two-dimensional image plane on the right; a one-dimensional kernel line inside the domain is squashed to the origin of the codomain. The dimensions sum: 3 equals 1 (kernel) plus 2 (image).</desc>
  <rect width="960" height="420" fill="#f8fafc"/>
  <defs>
    <marker id="rn-arrow-blue" markerWidth="12" markerHeight="12" refX="10" refY="6" orient="auto">
      <path d="M1 1 L11 6 L1 11 Z" fill="#2563eb"/>
    </marker>
    <marker id="rn-arrow-red" markerWidth="12" markerHeight="12" refX="10" refY="6" orient="auto">
      <path d="M1 1 L11 6 L1 11 Z" fill="#dc2626"/>
    </marker>
    <marker id="rn-arrow-green" markerWidth="12" markerHeight="12" refX="10" refY="6" orient="auto">
      <path d="M1 1 L11 6 L1 11 Z" fill="#059669"/>
    </marker>
    <marker id="rn-arrow-grey" markerWidth="14" markerHeight="14" refX="12" refY="7" orient="auto">
      <path d="M1 1 L13 7 L1 13 Z" fill="#475569"/>
    </marker>
  </defs>
  <g font-family="Inter, Arial, sans-serif" fill="#0f172a">
    <text x="40" y="40" font-size="24" font-weight="700">a linear map: kernel squashed, image traced out</text>
  </g>
  <g transform="translate(30,80)">
    <g stroke="#cbd5e1" stroke-width="1">
      <path d="M30 240 L330 240"/>
      <path d="M180 30 L180 320"/>
      <path d="M70 320 L290 70"/>
    </g>
    <text x="20" y="20" font-size="18" font-weight="700" fill="#334155">domain V (dim 3)</text>
    <circle cx="180" cy="220" r="6" fill="#0f172a"/>
    <g fill="none" stroke-linecap="round" stroke-width="5">
      <path d="M180 220 L290 220" stroke="#2563eb" marker-end="url(#rn-arrow-blue)"/>
      <path d="M180 220 L180 110" stroke="#dc2626" marker-end="url(#rn-arrow-red)"/>
      <path d="M180 220 L100 140" stroke="#059669" marker-end="url(#rn-arrow-green)"/>
    </g>
    <text x="296" y="218" font-size="18" font-weight="700" fill="#2563eb">v_1</text>
    <text x="190" y="108" font-size="18" font-weight="700" fill="#dc2626">v_2</text>
    <text x="60" y="138" font-size="18" font-weight="700" fill="#059669">u_1</text>
    <g stroke="#059669" stroke-width="2.5" stroke-dasharray="6 6" fill="none">
      <path d="M70 310 L290 70"/>
    </g>
    <text x="60" y="350" font-size="15" fill="#059669">kernel line: every arrow on it lands on the origin</text>
  </g>
  <g transform="translate(420,180)">
    <path d="M0 30 L100 30" stroke="#475569" stroke-width="4" fill="none" marker-end="url(#rn-arrow-grey)"/>
    <text x="20" y="20" font-size="20" font-weight="700" fill="#0f172a">T</text>
  </g>
  <g transform="translate(560,80)">
    <text x="0" y="20" font-size="18" font-weight="700" fill="#334155">codomain W; image (dim 2)</text>
    <polygon points="40,210 320,160 360,250 80,300" fill="#dbeafe" stroke="#1d4ed8" stroke-width="2" opacity="0.85"/>
    <circle cx="180" cy="240" r="6" fill="#0f172a"/>
    <g fill="none" stroke-linecap="round" stroke-width="5">
      <path d="M180 240 L300 195" stroke="#2563eb" marker-end="url(#rn-arrow-blue)"/>
      <path d="M180 240 L120 285" stroke="#dc2626" marker-end="url(#rn-arrow-red)"/>
    </g>
    <text x="304" y="195" font-size="18" font-weight="700" fill="#2563eb">T v_1</text>
    <text x="80" y="295" font-size="18" font-weight="700" fill="#dc2626">T v_2</text>
    <text x="160" y="232" font-size="14" fill="#0f172a">T u_1 = 0</text>
    <text x="0" y="350" font-size="15" fill="#1d4ed8">image plane spanned by T v_1 and T v_2</text>
  </g>
  <g font-family="Inter, Arial, sans-serif" fill="#0f172a">
    <text x="40" y="400" font-size="18" font-weight="700">3 = 1 + 2: dim V equals dim(kernel) plus dim(image)</text>
  </g>
</svg>
