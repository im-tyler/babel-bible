<svg xmlns="http://www.w3.org/2000/svg" width="900" height="460" viewBox="0 0 900 460" role="img" aria-labelledby="title desc">
  <title id="title">Vector bundle connection as parallel comparison</title>
  <desc id="desc">A connection compares vectors in neighboring fibers by declaring which nearby vector should be considered parallel along a path.</desc>
  <rect width="900" height="460" fill="#f8fafc"/>
  <path d="M100 330 C230 255 330 350 460 278 C590 205 690 280 800 210 L800 385 L100 385 Z" fill="#dcfce7" stroke="#16a34a" stroke-width="4"/>
  <path d="M175 306 C300 260 400 300 520 246 C615 204 695 225 760 210" fill="none" stroke="#2563eb" stroke-width="6" stroke-linecap="round"/>
  <g stroke="#1f2933" stroke-width="4" stroke-linecap="round">
    <line x1="235" y1="278" x2="235" y2="150"/>
    <line x1="420" y1="290" x2="420" y2="142"/>
    <line x1="625" y1="222" x2="625" y2="96"/>
  </g>
  <g stroke="#dc2626" stroke-width="6" stroke-linecap="round">
    <line x1="235" y1="215" x2="285" y2="173"/>
    <line x1="420" y1="224" x2="470" y2="182"/>
    <line x1="625" y1="158" x2="675" y2="116"/>
  </g>
  <g fill="#2563eb">
    <circle cx="235" cy="278" r="8"/>
    <circle cx="420" cy="290" r="8"/>
    <circle cx="625" cy="222" r="8"/>
  </g>
  <path d="M285 173 C345 150 410 160 470 182" fill="none" stroke="#dc2626" stroke-width="3" stroke-dasharray="8 8"/>
  <path d="M470 182 C520 188 590 150 675 116" fill="none" stroke="#dc2626" stroke-width="3" stroke-dasharray="8 8"/>
  <text x="450" y="58" text-anchor="middle" font-family="Inter, Arial, sans-serif" font-size="30" fill="#1f2933">parallel transport along a path</text>
  <text x="450" y="424" text-anchor="middle" font-family="Inter, Arial, sans-serif" font-size="22" fill="#475569">A connection tells nearby fibers how to compare their vectors.</text>
</svg>
