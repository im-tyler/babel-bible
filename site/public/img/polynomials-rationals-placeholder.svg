<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 720 360" role="img" aria-labelledby="title desc">
  <title id="title">Polynomials and rational expressions</title>
  <desc id="desc">A schematic placeholder diagram showing a smooth cubic-style polynomial curve on the left and a rational expression with a vertical asymptote on the right, marked with axes.</desc>
  <rect width="720" height="360" fill="#f4f4ec"/>
  <!-- Left panel: polynomial curve -->
  <g>
    <line x1="40" y1="320" x2="340" y2="320" stroke="#222" stroke-width="2"/>
    <line x1="190" y1="40" x2="190" y2="340" stroke="#222" stroke-width="2"/>
    <path d="M60 100 Q120 320 190 200 Q260 80 320 300" fill="none" stroke="#5a3d6f" stroke-width="6" stroke-linecap="round"/>
    <text x="190" y="20" text-anchor="middle" font-family="Inter, Arial, sans-serif" font-size="20" fill="#222">p(x) = x³ − 3x</text>
    <text x="190" y="356" text-anchor="middle" font-family="Inter, Arial, sans-serif" font-size="18" fill="#222">smooth polynomial curve</text>
  </g>
  <!-- Right panel: rational expression with asymptote -->
  <g>
    <line x1="400" y1="320" x2="700" y2="320" stroke="#222" stroke-width="2"/>
    <line x1="550" y1="40" x2="550" y2="340" stroke="#222" stroke-width="2"/>
    <line x1="600" y1="40" x2="600" y2="340" stroke="#a83232" stroke-width="3" stroke-dasharray="10 8"/>
    <path d="M420 290 Q500 230 580 80" fill="none" stroke="#d68a3a" stroke-width="6" stroke-linecap="round"/>
    <path d="M620 320 Q680 200 700 150" fill="none" stroke="#d68a3a" stroke-width="6" stroke-linecap="round"/>
    <text x="550" y="20" text-anchor="middle" font-family="Inter, Arial, sans-serif" font-size="20" fill="#222">r(x) = 1 / (x − 2)</text>
    <text x="610" y="60" text-anchor="start" font-family="Inter, Arial, sans-serif" font-size="16" fill="#a83232">x = 2</text>
    <text x="550" y="356" text-anchor="middle" font-family="Inter, Arial, sans-serif" font-size="18" fill="#222">vertical asymptote where denominator vanishes</text>
  </g>
</svg>
