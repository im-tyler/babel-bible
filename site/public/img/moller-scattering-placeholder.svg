<svg xmlns="http://www.w3.org/2000/svg" width="960" height="540" viewBox="0 0 960 540" role="img" aria-labelledby="title desc">
  <title id="title">Møller scattering — t- and u-channel tree diagrams and the CM angular distribution</title>
  <desc id="desc">Two QED tree-level Feynman diagrams for the elastic identical-fermion process electron plus electron to electron plus electron: a t-channel diagram in which a single virtual photon of four-momentum p_1 minus p_3 is exchanged straight through between the two electron lines, and a u-channel diagram in which the same photon exchange is taken with the two outgoing electron legs crossed (carrying four-momentum p_1 minus p_4). A relative minus sign between the two amplitudes reflects identical-fermion antisymmetrisation. A polar plot below sketches the differential cross section in the centre-of-mass frame as a function of scattering angle theta: the symmetric two-lobed distribution with sharp forward (small theta) and backward (large theta, equivalent by indistinguishability) Coulomb-like peaks at high energy, scaling as 1 over sine-to-the-fourth of theta over two, dominated by t- and u-channel contributions with a destructive interference at intermediate angles. The high-energy spin-averaged squared amplitude and the centre-of-mass differential cross section are displayed.</desc>
  <rect width="960" height="540" fill="#f8faf7"/>

  <defs>
    <marker id="fermarrow" markerWidth="10" markerHeight="10" refX="8" refY="5" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L8,5 L0,10 z" fill="#264653"/>
    </marker>
  </defs>

  <text x="480" y="34" text-anchor="middle" font-family="Arial, sans-serif" font-size="24" fill="#23424a" font-weight="bold">Møller scattering — tree-level QED</text>
  <text x="480" y="58" text-anchor="middle" font-family="Arial, sans-serif" font-size="14" fill="#23424a">e⁻(p₁) + e⁻(p₂) → e⁻(p₃) + e⁻(p₄),  Mandelstam s + t + u = 4m²</text>

  <!-- t-channel diagram -->
  <text x="200" y="92" text-anchor="middle" font-family="Arial, sans-serif" font-size="18" fill="#23424a" font-weight="bold">t-channel</text>
  <!-- incoming electron 1 (top left) -->
  <line x1="60" y1="130" x2="160" y2="160" stroke="#264653" stroke-width="2.2" marker-end="url(#fermarrow)"/>
  <text x="60" y="118" text-anchor="middle" font-family="Arial, sans-serif" font-size="13" fill="#264653">e⁻ (p₁)</text>
  <!-- outgoing electron 3 (top right) -->
  <line x1="160" y1="160" x2="340" y2="130" stroke="#264653" stroke-width="2.2" marker-end="url(#fermarrow)"/>
  <text x="350" y="124" text-anchor="middle" font-family="Arial, sans-serif" font-size="13" fill="#264653">e⁻ (p₃)</text>
  <!-- vertex 1 -->
  <circle cx="160" cy="160" r="3" fill="#23424a"/>
  <!-- internal photon (wavy) -->
  <path d="M160 160 q8 14 0 28 q-8 14 0 28 q8 14 0 28 q-8 14 0 28 q8 14 0 28" fill="none" stroke="#e76f51" stroke-width="2.2"/>
  <text x="120" y="232" text-anchor="middle" font-family="Arial, sans-serif" font-size="12" fill="#e76f51">γ* (q = p₁ − p₃)</text>
  <text x="120" y="252" text-anchor="middle" font-family="Arial, sans-serif" font-size="11" fill="#8a8a8a">∝ 1/t</text>
  <!-- vertex 2 -->
  <circle cx="160" cy="300" r="3" fill="#23424a"/>
  <!-- incoming electron 2 (bottom left) -->
  <line x1="60" y1="330" x2="160" y2="300" stroke="#264653" stroke-width="2.2" marker-end="url(#fermarrow)"/>
  <text x="60" y="350" text-anchor="middle" font-family="Arial, sans-serif" font-size="13" fill="#264653">e⁻ (p₂)</text>
  <!-- outgoing electron 4 (bottom right) -->
  <line x1="160" y1="300" x2="340" y2="330" stroke="#264653" stroke-width="2.2" marker-end="url(#fermarrow)"/>
  <text x="350" y="346" text-anchor="middle" font-family="Arial, sans-serif" font-size="13" fill="#264653">e⁻ (p₄)</text>
  <!-- amplitude label -->
  <text x="200" y="385" text-anchor="middle" font-family="Arial, sans-serif" font-size="12" fill="#23424a">𝓜_t = (−ie)² ū(p₃)γ^μ u(p₁) · (−iη_μν/t) · ū(p₄)γ^ν u(p₂)</text>

  <!-- u-channel diagram -->
  <text x="600" y="92" text-anchor="middle" font-family="Arial, sans-serif" font-size="18" fill="#23424a" font-weight="bold">u-channel (legs crossed)</text>
  <!-- incoming electron 1 (top left) -->
  <line x1="460" y1="130" x2="560" y2="160" stroke="#264653" stroke-width="2.2" marker-end="url(#fermarrow)"/>
  <text x="460" y="118" text-anchor="middle" font-family="Arial, sans-serif" font-size="13" fill="#264653">e⁻ (p₁)</text>
  <!-- outgoing electron 4 (top right, crossed) -->
  <line x1="560" y1="160" x2="740" y2="330" stroke="#264653" stroke-width="2.2" marker-end="url(#fermarrow)"/>
  <text x="750" y="346" text-anchor="middle" font-family="Arial, sans-serif" font-size="13" fill="#264653">e⁻ (p₄)</text>
  <!-- vertex 1 -->
  <circle cx="560" cy="160" r="3" fill="#23424a"/>
  <!-- internal photon (wavy) -->
  <path d="M560 160 q8 14 0 28 q-8 14 0 28 q8 14 0 28 q-8 14 0 28 q8 14 0 28" fill="none" stroke="#e76f51" stroke-width="2.2"/>
  <text x="520" y="232" text-anchor="middle" font-family="Arial, sans-serif" font-size="12" fill="#e76f51">γ* (q = p₁ − p₄)</text>
  <text x="520" y="252" text-anchor="middle" font-family="Arial, sans-serif" font-size="11" fill="#8a8a8a">∝ 1/u</text>
  <!-- vertex 2 -->
  <circle cx="560" cy="300" r="3" fill="#23424a"/>
  <!-- incoming electron 2 (bottom left) -->
  <line x1="460" y1="330" x2="560" y2="300" stroke="#264653" stroke-width="2.2" marker-end="url(#fermarrow)"/>
  <text x="460" y="350" text-anchor="middle" font-family="Arial, sans-serif" font-size="13" fill="#264653">e⁻ (p₂)</text>
  <!-- outgoing electron 3 (bottom right, crossed up) -->
  <line x1="560" y1="300" x2="740" y2="130" stroke="#264653" stroke-width="2.2" marker-end="url(#fermarrow)"/>
  <text x="750" y="124" text-anchor="middle" font-family="Arial, sans-serif" font-size="13" fill="#264653">e⁻ (p₃)</text>
  <!-- amplitude label -->
  <text x="600" y="385" text-anchor="middle" font-family="Arial, sans-serif" font-size="12" fill="#23424a">𝓜_u = (−ie)² ū(p₄)γ^μ u(p₁) · (−iη_μν/u) · ū(p₃)γ^ν u(p₂)</text>

  <!-- Relative-minus sign explanation -->
  <text x="480" y="415" text-anchor="middle" font-family="Arial, sans-serif" font-size="14" fill="#23424a" font-weight="bold">𝓜 = 𝓜_t − 𝓜_u   (identical-fermion antisymmetrisation)</text>

  <!-- Master formula box -->
  <rect x="40" y="440" width="880" height="78" fill="#ffffff" stroke="#23424a" stroke-width="1.2" rx="4"/>
  <text x="60" y="464" font-family="Arial, sans-serif" font-size="13" fill="#23424a" font-weight="bold">Spin-averaged squared amplitude (high-energy limit s, |t|, |u| ≫ m²):</text>
  <text x="60" y="484" font-family="Arial, sans-serif" font-size="13" fill="#23424a">|𝓜̄|² = 2e⁴ [ (s² + u²)/t² + (s² + t²)/u² + 2s²/(tu) ]</text>
  <text x="60" y="504" font-family="Arial, sans-serif" font-size="13" fill="#23424a">dσ/dΩ|_CM = (α² / 4s) · [ (s²+u²)/t² + (s²+t²)/u² + 2s²/(tu) ] + 𝒪(m²/s)</text>
</svg>
