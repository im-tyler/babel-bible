<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 960 420" role="img" aria-labelledby="title desc">
  <title id="title">Determinant as signed area of the parallelogram spanned by two column vectors</title>
  <desc id="desc">On the left, two column vectors (2,3) and (1,4) in the plane span a parallelogram of signed area 5; on the right, the same picture flipped to illustrate that swapping the two columns reverses orientation and gives signed area −5. The numerical identity 2·4 − 1·3 = 5 is shown beneath the left panel, and the determinant axioms (multilinear, alternating, det I = 1) are listed at the bottom.</desc>
  <rect width="960" height="420" fill="#f8fafc"/>
  <defs>
    <marker id="det-arrow-blue" markerWidth="12" markerHeight="12" refX="10" refY="6" orient="auto">
      <path d="M1 1 L11 6 L1 11 Z" fill="#2563eb"/>
    </marker>
    <marker id="det-arrow-red" markerWidth="12" markerHeight="12" refX="10" refY="6" orient="auto">
      <path d="M1 1 L11 6 L1 11 Z" fill="#dc2626"/>
    </marker>
  </defs>
  <g font-family="Inter, Arial, sans-serif" fill="#0f172a">
    <text x="40" y="40" font-size="24" font-weight="700">determinant: signed area of the column parallelogram</text>
  </g>
  <g transform="translate(40,70)">
    <text x="0" y="20" font-size="18" font-weight="700" fill="#334155">columns (2,3) and (1,4): det = +5</text>
    <g stroke="#cbd5e1" stroke-width="1">
      <path d="M0 240 L360 240"/>
      <path d="M40 40 L40 320"/>
    </g>
    <g font-size="12" fill="#64748b">
      <text x="40" y="252">0</text>
      <text x="100" y="252">1</text>
      <text x="160" y="252">2</text>
      <text x="220" y="252">3</text>
      <text x="280" y="252">4</text>
      <text x="20" y="240">0</text>
      <text x="20" y="180">1</text>
      <text x="20" y="120">2</text>
      <text x="20" y="60">3</text>
    </g>
    <polygon points="40,240 160,60 220,0 100,180" fill="#dbeafe" stroke="#1d4ed8" stroke-width="2" opacity="0.85"/>
    <g fill="none" stroke-linecap="round" stroke-width="5">
      <path d="M40 240 L160 60" stroke="#2563eb" marker-end="url(#det-arrow-blue)"/>
      <path d="M40 240 L100 180" stroke="#dc2626" marker-end="url(#det-arrow-red)"/>
    </g>
    <text x="170" y="58" font-size="16" font-weight="700" fill="#2563eb">(2,3)</text>
    <text x="108" y="178" font-size="16" font-weight="700" fill="#dc2626">(1,4)</text>
    <text x="0" y="360" font-size="16" fill="#0f172a">2·4 − 1·3 = 5  (signed area = +5, columns oriented anticlockwise)</text>
  </g>
  <g transform="translate(520,70)">
    <text x="0" y="20" font-size="18" font-weight="700" fill="#334155">columns swapped: det = −5</text>
    <g stroke="#cbd5e1" stroke-width="1">
      <path d="M0 240 L360 240"/>
      <path d="M40 40 L40 320"/>
    </g>
    <g font-size="12" fill="#64748b">
      <text x="40" y="252">0</text>
      <text x="100" y="252">1</text>
      <text x="160" y="252">2</text>
      <text x="220" y="252">3</text>
      <text x="280" y="252">4</text>
    </g>
    <polygon points="40,240 100,180 220,0 160,60" fill="#fee2e2" stroke="#991b1b" stroke-width="2" opacity="0.85"/>
    <g fill="none" stroke-linecap="round" stroke-width="5">
      <path d="M40 240 L100 180" stroke="#dc2626" marker-end="url(#det-arrow-red)"/>
      <path d="M40 240 L160 60" stroke="#2563eb" marker-end="url(#det-arrow-blue)"/>
    </g>
    <text x="108" y="178" font-size="16" font-weight="700" fill="#dc2626">(1,4)</text>
    <text x="170" y="58" font-size="16" font-weight="700" fill="#2563eb">(2,3)</text>
    <text x="0" y="360" font-size="16" fill="#0f172a">1·3 − 2·4 = −5  (swapping columns flips the sign)</text>
  </g>
  <g font-family="Inter, Arial, sans-serif" fill="#0f172a">
    <text x="40" y="410" font-size="15" fill="#475569">axioms: multilinear in columns,  alternating (swap flips sign),  det I = 1</text>
  </g>
</svg>
