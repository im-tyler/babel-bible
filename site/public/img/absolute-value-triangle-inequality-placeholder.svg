<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 720 360" role="img" aria-labelledby="title desc">
  <title id="title">Absolute Value and the Triangle Inequality</title>
  <desc id="desc">A schematic placeholder diagram showing three points a, b, c on a line with the direct path from a to c and the detour through b.</desc>
  <rect width="720" height="360" fill="#f4f4ec"/>
  <line x1="60" y1="220" x2="660" y2="220" stroke="#222" stroke-width="2"/>
  <g fill="#5a3d6f">
    <circle cx="120" cy="220" r="9"/>
    <circle cx="430" cy="220" r="9"/>
    <circle cx="600" cy="220" r="9"/>
  </g>
  <text x="120" y="252" text-anchor="middle" font-family="Inter, Arial, sans-serif" font-size="22" fill="#222">a</text>
  <text x="430" y="252" text-anchor="middle" font-family="Inter, Arial, sans-serif" font-size="22" fill="#222">b</text>
  <text x="600" y="252" text-anchor="middle" font-family="Inter, Arial, sans-serif" font-size="22" fill="#222">c</text>
  <path d="M120 200 Q275 110 430 200" fill="none" stroke="#d68a3a" stroke-width="6" stroke-linecap="round"/>
  <path d="M430 200 Q515 110 600 200" fill="none" stroke="#d68a3a" stroke-width="6" stroke-linecap="round"/>
  <path d="M120 200 Q360 60 600 200" fill="none" stroke="#5a3d6f" stroke-width="6" stroke-linecap="round" stroke-dasharray="14 10"/>
  <text x="275" y="100" text-anchor="middle" font-family="Inter, Arial, sans-serif" font-size="20" fill="#d68a3a">|a - b|</text>
  <text x="515" y="100" text-anchor="middle" font-family="Inter, Arial, sans-serif" font-size="20" fill="#d68a3a">|b - c|</text>
  <text x="360" y="50" text-anchor="middle" font-family="Inter, Arial, sans-serif" font-size="20" fill="#5a3d6f">|a - c|</text>
  <text x="360" y="325" text-anchor="middle" font-family="Inter, Arial, sans-serif" font-size="26" fill="#222">|a - c| ≤ |a - b| + |b - c|</text>
</svg>
