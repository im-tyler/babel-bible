<svg xmlns="http://www.w3.org/2000/svg" width="900" height="460" viewBox="0 0 900 460" role="img" aria-labelledby="title desc">
  <title id="title">Cauchy paths in complete and incomplete spaces</title>
  <desc id="desc">A Cauchy sequence inside a complete space lands in the space, while a Cauchy sequence in a space with a missing point approaches a hole.</desc>
  <rect width="900" height="460" fill="#f8fafc"/>
  <g transform="translate(70 70)">
    <rect x="0" y="0" width="330" height="290" rx="8" fill="#ffffff" stroke="#1f2933" stroke-width="3"/>
    <text x="165" y="42" text-anchor="middle" font-family="Inter, Arial, sans-serif" font-size="27" fill="#1f2933">complete</text>
    <circle cx="165" cy="160" r="95" fill="#dcfce7" stroke="#16a34a" stroke-width="4"/>
    <path d="M72 224 C120 176 130 142 158 154 C180 164 190 138 207 128 C226 116 240 112 258 102" fill="none" stroke="#2563eb" stroke-width="5" stroke-linecap="round"/>
    <g fill="#2563eb">
      <circle cx="72" cy="224" r="7"/>
      <circle cx="122" cy="174" r="7"/>
      <circle cx="158" cy="154" r="7"/>
      <circle cx="207" cy="128" r="7"/>
      <circle cx="258" cy="102" r="7"/>
    </g>
    <circle cx="270" cy="96" r="10" fill="#16a34a"/>
    <text x="165" y="270" text-anchor="middle" font-family="Inter, Arial, sans-serif" font-size="18" fill="#475569">Cauchy sequence has a limit inside</text>
  </g>
  <g transform="translate(500 70)">
    <rect x="0" y="0" width="330" height="290" rx="8" fill="#ffffff" stroke="#1f2933" stroke-width="3"/>
    <text x="165" y="42" text-anchor="middle" font-family="Inter, Arial, sans-serif" font-size="27" fill="#1f2933">incomplete</text>
    <circle cx="165" cy="160" r="95" fill="#fee2e2" stroke="#dc2626" stroke-width="4"/>
    <circle cx="235" cy="100" r="22" fill="#ffffff" stroke="#dc2626" stroke-width="4" stroke-dasharray="7 7"/>
    <path d="M86 220 C130 190 160 154 188 130 C205 116 218 106 234 100" fill="none" stroke="#2563eb" stroke-width="5" stroke-linecap="round"/>
    <g fill="#2563eb">
      <circle cx="86" cy="220" r="7"/>
      <circle cx="130" cy="190" r="7"/>
      <circle cx="188" cy="130" r="7"/>
      <circle cx="220" cy="108" r="7"/>
    </g>
    <text x="165" y="270" text-anchor="middle" font-family="Inter, Arial, sans-serif" font-size="18" fill="#475569">Cauchy sequence approaches a missing point</text>
  </g>
  <text x="450" y="415" text-anchor="middle" font-family="Inter, Arial, sans-serif" font-size="22" fill="#1f2933">Banach space = vector space + norm + no missing limits</text>
</svg>
