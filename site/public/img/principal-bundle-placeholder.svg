<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 960 420" role="img" aria-labelledby="title desc">
  <title id="title">Principal bundle fibers</title>
  <desc id="desc">A base space with identical group-shaped fibers above nearby points and a local product window.</desc>
  <rect width="960" height="420" fill="#f8fafc"/>
  <path d="M90 295 C210 210 330 345 475 270 C610 200 730 325 870 245 L870 352 L90 352 Z" fill="#dbeafe" stroke="#1d4ed8" stroke-width="4"/>
  <g stroke="#475569" stroke-width="3" opacity="0.72">
    <path d="M220 245 V95"/>
    <path d="M360 292 V128"/>
    <path d="M505 260 V83"/>
    <path d="M660 286 V118"/>
  </g>
  <g fill="#ffffff" stroke="#0f766e" stroke-width="4">
    <circle cx="220" cy="95" r="38"/>
    <circle cx="360" cy="128" r="38"/>
    <circle cx="505" cy="83" r="38"/>
    <circle cx="660" cy="118" r="38"/>
  </g>
  <g fill="none" stroke="#0f766e" stroke-width="3">
    <path d="M195 95 C205 78 235 78 245 95 C235 112 205 112 195 95 Z"/>
    <path d="M335 128 C345 111 375 111 385 128 C375 145 345 145 335 128 Z"/>
    <path d="M480 83 C490 66 520 66 530 83 C520 100 490 100 480 83 Z"/>
    <path d="M635 118 C645 101 675 101 685 118 C675 135 645 135 635 118 Z"/>
  </g>
  <rect x="140" y="64" width="610" height="258" rx="8" fill="none" stroke="#7c3aed" stroke-width="4" stroke-dasharray="12 10"/>
  <g font-family="Inter, Arial, sans-serif" fill="#0f172a">
    <text x="84" y="52" font-size="30" font-weight="700">locally a product, globally allowed to twist</text>
    <text x="758" y="94" font-size="20" font-weight="700" fill="#7c3aed">local window</text>
    <text x="136" y="382" font-size="19">base space</text>
    <text x="700" y="182" font-size="19">each fiber looks like the group G</text>
  </g>
</svg>
