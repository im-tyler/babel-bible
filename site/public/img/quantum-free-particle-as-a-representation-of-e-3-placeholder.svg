<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 720 360" role="img" aria-labelledby="title desc">
  <title id="title">Quantum free particle as a representation of E(3)</title>
  <desc id="desc">A schematic placeholder showing a plane-wave wave function, its image under translation and rotation, and the fixed-energy momentum sphere that constitutes the E(3) orbit for a free particle of mass m.</desc>
  <rect width="720" height="360" fill="#fbf5ee"/>
  <defs>
    <marker id="ar" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M0 0 L10 5 L0 10 z" fill="#3a6a4f"/>
    </marker>
  </defs>
  <g stroke="#3a6a4f" stroke-width="2" fill="none">
    <path d="M40 120 Q70 70 100 120 T160 120 T220 120 T280 120"/>
    <path d="M40 200 L280 200" stroke-dasharray="4 4"/>
    <path d="M280 160 L320 160" stroke-width="3" marker-end="url(#ar)"/>
  </g>
  <g stroke="#c66a3a" stroke-width="2" fill="none">
    <path d="M340 120 Q370 70 400 120 T460 120 T520 120 T580 120"/>
    <path d="M340 200 L580 200" stroke-dasharray="4 4"/>
  </g>
  <text x="160" y="240" text-anchor="middle" font-family="Inter, Arial, sans-serif" font-size="14" fill="#222">psi(x) = e^(i k x)</text>
  <text x="460" y="240" text-anchor="middle" font-family="Inter, Arial, sans-serif" font-size="14" fill="#222">psi(x - a) = e^(-i k a) psi(x)</text>
  <g transform="translate(550, 285)">
    <circle cx="60" cy="40" r="38" fill="none" stroke="#3a6a4f" stroke-width="2"/>
    <ellipse cx="60" cy="40" rx="38" ry="12" fill="none" stroke="#3a6a4f" stroke-width="1" stroke-dasharray="3 3"/>
    <circle cx="60" cy="40" r="2.5" fill="#c66a3a"/>
    <circle cx="92" cy="32" r="2.5" fill="#c66a3a"/>
    <circle cx="32" cy="48" r="2.5" fill="#c66a3a"/>
    <circle cx="78" cy="62" r="2.5" fill="#c66a3a"/>
    <text x="60" y="98" text-anchor="middle" font-family="Inter, Arial, sans-serif" font-size="11" fill="#222">orbit S^2_{k_0}</text>
  </g>
  <text x="360" y="340" text-anchor="middle" font-family="Inter, Arial, sans-serif" font-size="16" fill="#222">Plane wave under translation; fixed-energy orbit in momentum space</text>
</svg>
