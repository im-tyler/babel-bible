<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 360 200" role="img" aria-label="Bivector e1 wedge e2 illustration">
  <defs>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="9" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L0,6 L9,3 z" fill="currentColor" />
    </marker>
  </defs>
  <style>
    .axis { stroke: currentColor; stroke-width: 2; fill: none; }
    .face { fill: currentColor; opacity: 0.12; stroke: currentColor; stroke-width: 1.5; stroke-dasharray: 4 3; }
    .lab  { font: 600 14px "Georgia", serif; fill: currentColor; }
    .sub  { font: 400 11px "Helvetica Neue", sans-serif; fill: currentColor; opacity: 0.7; }
    .swirl { fill: none; stroke: currentColor; stroke-width: 1.5; opacity: 0.7; }
  </style>
  <!-- Axes -->
  <line class="axis" x1="60" y1="160" x2="220" y2="160" marker-end="url(#arrow)" />
  <line class="axis" x1="60" y1="160" x2="60"  y2="40"  marker-end="url(#arrow)" />
  <!-- Bivector face -->
  <rect class="face" x="60" y="60" width="100" height="100" />
  <!-- Sweep arc (e1 -> e2) -->
  <path class="swirl" d="M 130 160 Q 100 110 60 110" marker-end="url(#arrow)" />
  <!-- Labels -->
  <text class="lab" x="225" y="165">e₁</text>
  <text class="lab" x="35"  y="42">e₂</text>
  <text class="lab" x="92"  y="115">e₁ ∧ e₂</text>
  <text class="sub" x="92"  y="132">(unit oriented area)</text>
  <text class="sub" x="240" y="40">v ↦ (e₁ ∧ e₂) v rotates by 90°</text>
</svg>
