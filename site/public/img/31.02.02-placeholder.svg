<svg xmlns="http://www.w3.org/2000/svg" width="900" height="460" viewBox="0 0 900 460" role="img" aria-labelledby="title desc">
  <title id="title">Thick description: the same gesture, layered meanings</title>
  <desc id="desc">An eyelid contraction branches into twitch, wink, parody, and rehearsal — illustrating Geertz's distinction between thin and thick description.</desc>
  <rect width="900" height="460" fill="#f8fafc"/>
  <g transform="translate(60 70)">
    <rect x="0" y="0" width="780" height="320" rx="8" fill="#ffffff" stroke="#1f2933" stroke-width="3"/>
    <text x="390" y="42" text-anchor="middle" font-family="Inter, Arial, sans-serif" font-size="26" fill="#1f2933">thin description: eyelid contracts</text>
    <circle cx="390" cy="90" r="10" fill="#64748b"/>
    <line x1="390" y1="100" x2="390" y2="150" stroke="#64748b" stroke-width="5"/>
    <text x="390" y="180" text-anchor="middle" font-family="Inter, Arial, sans-serif" font-size="22" fill="#475569">what does it mean?</text>
    <line x1="390" y1="195" x2="130" y2="240" stroke="#94a3b8" stroke-width="2"/>
    <line x1="390" y1="195" x2="303" y2="240" stroke="#94a3b8" stroke-width="2"/>
    <line x1="390" y1="195" x2="477" y2="240" stroke="#94a3b8" stroke-width="2"/>
    <line x1="390" y1="195" x2="650" y2="240" stroke="#94a3b8" stroke-width="2"/>
    <rect x="70" y="240" width="120" height="48" rx="6" fill="#fee2e2" stroke="#dc2626" stroke-width="2"/>
    <text x="130" y="270" text-anchor="middle" font-family="Inter, Arial, sans-serif" font-size="17" fill="#991b1b">twitch</text>
    <rect x="243" y="240" width="120" height="48" rx="6" fill="#dbeafe" stroke="#2563eb" stroke-width="2"/>
    <text x="303" y="270" text-anchor="middle" font-family="Inter, Arial, sans-serif" font-size="17" fill="#1e40af">wink</text>
    <rect x="417" y="240" width="120" height="48" rx="6" fill="#fef3c7" stroke="#d97706" stroke-width="2"/>
    <text x="477" y="270" text-anchor="middle" font-family="Inter, Arial, sans-serif" font-size="17" fill="#92400e">parody of wink</text>
    <rect x="590" y="240" width="120" height="48" rx="6" fill="#dcfce7" stroke="#16a34a" stroke-width="2"/>
    <text x="650" y="270" text-anchor="middle" font-family="Inter, Arial, sans-serif" font-size="17" fill="#166534">rehearsal</text>
  </g>
  <text x="450" y="425" text-anchor="middle" font-family="Inter, Arial, sans-serif" font-size="22" fill="#1f2933">thick description: the same movement, different cultural meanings</text>
</svg>
