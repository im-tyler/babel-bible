<svg xmlns="http://www.w3.org/2000/svg" width="960" height="540" viewBox="0 0 960 540" role="img" aria-labelledby="title desc">
  <title id="title">Bott periodicity visual</title>
  <desc id="desc">A looped ladder shows complex K-theory repeating every two steps and real K-theory repeating every eight steps.</desc>
  <rect width="960" height="540" fill="#f7f8fb"/>
  <path d="M146 280 C210 140 344 140 410 280 C474 420 608 420 674 280 C738 140 858 150 884 260" fill="none" stroke="#264653" stroke-width="10" stroke-linecap="round"/>
  <path d="M156 280 C218 176 338 176 400 280 C462 384 582 384 644 280 C706 176 812 176 870 260" fill="none" stroke="#2a9d8f" stroke-width="5" stroke-linecap="round"/>
  <g font-family="Arial, sans-serif" text-anchor="middle" fill="#264653">
    <circle cx="150" cy="280" r="48" fill="#fff" stroke="#264653" stroke-width="5"/>
    <text x="150" y="289" font-size="28">K</text>
    <circle cx="410" cy="280" r="48" fill="#fff" stroke="#264653" stroke-width="5"/>
    <text x="410" y="289" font-size="28">K+2</text>
    <circle cx="674" cy="280" r="48" fill="#fff" stroke="#264653" stroke-width="5"/>
    <text x="674" y="289" font-size="28">K+4</text>
    <text x="480" y="96" font-size="34">same pattern returns</text>
    <text x="480" y="466" font-size="28">complex: period 2 · real: period 8</text>
  </g>
  <path d="M765 118 C870 142 920 220 883 305" fill="none" stroke="#e76f51" stroke-width="7" stroke-linecap="round" marker-end="url(#arrow)"/>
  <defs>
    <marker id="arrow" markerWidth="12" markerHeight="12" refX="10" refY="6" orient="auto">
      <path d="M0 0 L12 6 L0 12 Z" fill="#e76f51"/>
    </marker>
  </defs>
</svg>
