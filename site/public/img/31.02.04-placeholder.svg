<svg xmlns="http://www.w3.org/2000/svg" width="900" height="460" viewBox="0 0 900 460" role="img" aria-labelledby="title desc">
  <title id="title">Rites of passage: separation, liminality, incorporation</title>
  <desc id="desc">Van Gennep's three-phase ritual structure: a person leaves an old status (separation), enters a threshold state (liminality), and returns with a new status (incorporation).</desc>
  <rect width="900" height="460" fill="#f8fafc"/>
  <g transform="translate(60 70)">
    <rect x="0" y="0" width="780" height="320" rx="8" fill="#ffffff" stroke="#1f2933" stroke-width="3"/>
    <text x="390" y="44" text-anchor="middle" font-family="Inter, Arial, sans-serif" font-size="26" fill="#1f2933">rites of passage (Van Gennep)</text>
    <line x1="60" y1="200" x2="720" y2="200" stroke="#94a3b8" stroke-width="3"/>
    <rect x="40" y="160" width="140" height="80" rx="8" fill="#fee2e2" stroke="#dc2626" stroke-width="2"/>
    <text x="110" y="195" text-anchor="middle" font-family="Inter, Arial, sans-serif" font-size="18" fill="#991b1b">separation</text>
    <text x="110" y="220" text-anchor="middle" font-family="Inter, Arial, sans-serif" font-size="14" fill="#991b1b">leave old status</text>
    <rect x="320" y="150" width="140" height="100" rx="8" fill="#dbeafe" stroke="#2563eb" stroke-width="2"/>
    <text x="390" y="188" text-anchor="middle" font-family="Inter, Arial, sans-serif" font-size="18" fill="#1e40af">liminality</text>
    <text x="390" y="212" text-anchor="middle" font-family="Inter, Arial, sans-serif" font-size="14" fill="#1e40af">betwixt and between</text>
    <text x="390" y="232" text-anchor="middle" font-family="Inter, Arial, sans-serif" font-size="14" fill="#1e40af">communitas</text>
    <rect x="600" y="160" width="140" height="80" rx="8" fill="#dcfce7" stroke="#16a34a" stroke-width="2"/>
    <text x="670" y="195" text-anchor="middle" font-family="Inter, Arial, sans-serif" font-size="18" fill="#166534">incorporation</text>
    <text x="670" y="220" text-anchor="middle" font-family="Inter, Arial, sans-serif" font-size="14" fill="#166534">new status</text>
    <line x1="180" y1="200" x2="320" y2="200" stroke="#64748b" stroke-width="2" marker-end="url(#arrow)"/>
    <line x1="460" y1="200" x2="600" y2="200" stroke="#64748b" stroke-width="2" marker-end="url(#arrow)"/>
    <defs>
      <marker id="arrow" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
        <path d="M 0 0 L 10 5 L 0 10 z" fill="#64748b"/>
      </marker>
    </defs>
  </g>
  <text x="450" y="425" text-anchor="middle" font-family="Inter, Arial, sans-serif" font-size="22" fill="#1f2933">ritual moves a person from one social status to another through a threshold</text>
</svg>
