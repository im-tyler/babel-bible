<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 720 360" role="img" aria-labelledby="title desc">
  <title id="title">Furry's theorem</title>
  <desc id="desc">Schematic placeholder: two QED diagrams contrasted. The three-photon closed fermion loop (left) carries a red strike-through indicating Furry's theorem forces it to vanish; the four-photon box diagram (right) is permitted and shown with a green check, with caption noting the Euler-Heisenberg 1936 origin and ATLAS 2017 confirmation.</desc>
  <rect width="720" height="360" fill="#f6f1e7"/>
  <text x="360" y="36" text-anchor="middle" font-family="Inter, Arial, sans-serif" font-size="20" fill="#222">Charge-conjugation symmetry of QED: even-photon loops survive, odd-photon loops vanish</text>
  <g transform="translate(180,180)">
    <circle cx="0" cy="0" r="50" fill="none" stroke="#222" stroke-width="2"/>
    <line x1="-50" y1="0" x2="-100" y2="-40" stroke="#b86a2d" stroke-width="2"/>
    <line x1="50" y1="0" x2="100" y2="-40" stroke="#b86a2d" stroke-width="2"/>
    <line x1="0" y1="50" x2="0" y2="105" stroke="#b86a2d" stroke-width="2"/>
    <text x="-105" y="-46" font-family="Inter, Arial, sans-serif" font-size="14" fill="#b86a2d">photon</text>
    <text x="80" y="-46" font-family="Inter, Arial, sans-serif" font-size="14" fill="#b86a2d">photon</text>
    <text x="6" y="120" font-family="Inter, Arial, sans-serif" font-size="14" fill="#b86a2d">photon</text>
    <text x="0" y="6" text-anchor="middle" font-family="Inter, Arial, sans-serif" font-size="14" fill="#222">fermion loop</text>
    <line x1="-90" y1="-90" x2="90" y2="90" stroke="#b22" stroke-width="4"/>
    <line x1="-90" y1="90" x2="90" y2="-90" stroke="#b22" stroke-width="4"/>
    <text x="0" y="-95" text-anchor="middle" font-family="Inter, Arial, sans-serif" font-size="16" fill="#b22">vanishes (Furry 1937)</text>
  </g>
  <g transform="translate(540,180)">
    <rect x="-50" y="-50" width="100" height="100" fill="none" stroke="#222" stroke-width="2"/>
    <line x1="-50" y1="-50" x2="-90" y2="-90" stroke="#b86a2d" stroke-width="2"/>
    <line x1="50" y1="-50" x2="90" y2="-90" stroke="#b86a2d" stroke-width="2"/>
    <line x1="-50" y1="50" x2="-90" y2="90" stroke="#b86a2d" stroke-width="2"/>
    <line x1="50" y1="50" x2="90" y2="90" stroke="#b86a2d" stroke-width="2"/>
    <text x="0" y="6" text-anchor="middle" font-family="Inter, Arial, sans-serif" font-size="14" fill="#222">box loop</text>
    <text x="0" y="-95" text-anchor="middle" font-family="Inter, Arial, sans-serif" font-size="16" fill="#2d5a3d">survives (Euler-Heisenberg 1936)</text>
  </g>
  <text x="360" y="335" text-anchor="middle" font-family="Inter, Arial, sans-serif" font-size="16" fill="#222">Four-photon light-by-light scattering observed at the LHC by ATLAS in 2017</text>
</svg>
