<svg xmlns="http://www.w3.org/2000/svg" width="900" height="460" viewBox="0 0 900 460" role="img" aria-labelledby="title desc">
  <title id="title">Medieval European science: from scriptoria to impetus theory</title>
  <desc id="desc">A horizontal flow showing how scientific knowledge moved from monastic scriptoria through the Toledo translation movement and the founding of universities to the Oxford Calculators and Parisian impetus theorists.</desc>
  <rect width="900" height="460" fill="#f8fafc"/>
  <g transform="translate(40 60)">
    <rect x="0" y="0" width="820" height="330" rx="8" fill="#ffffff" stroke="#1f2933" stroke-width="3"/>
    <text x="410" y="40" text-anchor="middle" font-family="Inter, Arial, sans-serif" font-size="24" fill="#1f2933">recovery of Aristotle and the rise of universities</text>
    <line x1="60" y1="170" x2="760" y2="170" stroke="#94a3b8" stroke-width="3"/>
    <polygon points="760,170 748,164 748,176" fill="#94a3b8"/>
    <g font-family="Inter, Arial, sans-serif" font-size="15" fill="#1f2933" text-anchor="middle">
      <rect x="40" y="108" width="130" height="56" rx="6" fill="#fef3c7" stroke="#d97706" stroke-width="2"/>
      <text x="105" y="134">monastic</text>
      <text x="105" y="153">scriptoria</text>
      <text x="105" y="200" fill="#92400e" font-size="12">6th–10th c.</text>

      <rect x="190" y="108" width="130" height="56" rx="6" fill="#fee2e2" stroke="#dc2626" stroke-width="2"/>
      <text x="255" y="134">Toledo</text>
      <text x="255" y="153">translations</text>
      <text x="255" y="200" fill="#991b1b" font-size="12">12th c.</text>

      <rect x="340" y="108" width="130" height="56" rx="6" fill="#dbeafe" stroke="#2563eb" stroke-width="2"/>
      <text x="405" y="134">universities</text>
      <text x="405" y="153">Bologna, Paris</text>
      <text x="405" y="200" fill="#1e40af" font-size="12">11th–13th c.</text>

      <rect x="490" y="108" width="130" height="56" rx="6" fill="#dcfce7" stroke="#16a34a" stroke-width="2"/>
      <text x="555" y="134">Oxford</text>
      <text x="555" y="153">Calculators</text>
      <text x="555" y="200" fill="#166534" font-size="12">c. 1328</text>

      <rect x="640" y="108" width="130" height="56" rx="6" fill="#ede9fe" stroke="#7c3aed" stroke-width="2"/>
      <text x="705" y="134">Paris:</text>
      <text x="705" y="153">impetus theory</text>
      <text x="705" y="200" fill="#5b21b6" font-size="12">c. 1340</text>
    </g>
    <g font-family="Inter, Arial, sans-serif" font-size="13" fill="#475569" text-anchor="middle">
      <text x="105" y="250">copying manuscripts</text>
      <text x="255" y="250">Arabic into Latin</text>
      <text x="405" y="250">scholastic method</text>
      <text x="555" y="250">mean speed theorem</text>
      <text x="705" y="250">Buridan: vis impressa</text>
    </g>
    <text x="410" y="298" text-anchor="middle" font-family="Inter, Arial, sans-serif" font-size="14" fill="#334155">the continuity thesis: medieval tools feed the Scientific Revolution</text>
  </g>
  <text x="450" y="425" text-anchor="middle" font-family="Inter, Arial, sans-serif" font-size="22" fill="#1f2933">medieval European science: universities, scholasticism, Aristotle recovered</text>
</svg>
