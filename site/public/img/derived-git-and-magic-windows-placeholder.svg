<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 720 360" role="img" aria-labelledby="title desc">
  <title id="title">Derived GIT and magic windows</title>
  <desc id="desc">A schematic placeholder diagram of the derived category of a GIT quotient stack with two magic window subcategories carved out by shifted Hilbert-Mumford boxes, related by a wall-crossing window-shift autoequivalence.</desc>
  <rect width="720" height="360" fill="#f4f4ec"/>
  <rect x="40" y="60" width="640" height="240" fill="none" stroke="#5a3d6f" stroke-width="6"/>
  <text x="360" y="40" text-anchor="middle" font-family="Inter, Arial, sans-serif" font-size="20" fill="#222">D^b([X / G]) — the quotient stack derived category</text>
  <rect x="100" y="120" width="200" height="120" fill="none" stroke="#d68a3a" stroke-width="4"/>
  <text x="200" y="110" text-anchor="middle" font-family="Inter, Arial, sans-serif" font-size="16" fill="#d68a3a">magic window W(ℓ-)</text>
  <text x="200" y="190" text-anchor="middle" font-family="Inter, Arial, sans-serif" font-size="13" fill="#5a3d6f">≃ D^b(Q-)</text>
  <rect x="420" y="120" width="200" height="120" fill="none" stroke="#3a8a6f" stroke-width="4" stroke-dasharray="6 8"/>
  <text x="520" y="110" text-anchor="middle" font-family="Inter, Arial, sans-serif" font-size="16" fill="#3a8a6f">magic window W(ℓ+)</text>
  <text x="520" y="190" text-anchor="middle" font-family="Inter, Arial, sans-serif" font-size="13" fill="#5a3d6f">≃ D^b(Q+)</text>
  <path d="M 310 180 L 410 180" stroke="#222" stroke-width="4" fill="none" marker-end="url(#arrow)"/>
  <text x="360" y="170" text-anchor="middle" font-family="Inter, Arial, sans-serif" font-size="13" fill="#222">window shift</text>
  <text x="360" y="220" text-anchor="middle" font-family="Inter, Arial, sans-serif" font-size="11" fill="#222">(flop equivalence)</text>
  <text x="360" y="335" text-anchor="middle" font-family="Inter, Arial, sans-serif" font-size="18" fill="#222">Two GIT chambers → two windows → one derived equivalence</text>
  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#222"/>
    </marker>
  </defs>
</svg>
