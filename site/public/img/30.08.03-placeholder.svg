<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 720 460" role="img" aria-labelledby="title desc">
  <title id="title">Burgess concentric zone model</title>
  <desc id="desc">The Chicago School concentric zone model: five concentric rings radiating outward from a central business district — transition zone (industry and crowded housing), working-class zone, residential zone, and commuter zone — illustrating how competition for urban land sorts people and activities into distinct bands.</desc>
  <rect width="720" height="460" fill="#f6f1e7"/>
  <g font-family="Inter, Arial, sans-serif">
    <circle cx="230" cy="230" r="215" fill="#dbe7d4"/>
    <circle cx="230" cy="230" r="170" fill="#e8d9a8"/>
    <circle cx="230" cy="230" r="125" fill="#d9b896"/>
    <circle cx="230" cy="230" r="78" fill="#c89461"/>
    <circle cx="230" cy="230" r="34" fill="#8a4a3a"/>
  </g>
  <g fill="none" stroke="#555" stroke-width="1" opacity="0.5">
    <circle cx="230" cy="230" r="215"/>
    <circle cx="230" cy="230" r="170"/>
    <circle cx="230" cy="230" r="125"/>
    <circle cx="230" cy="230" r="78"/>
    <circle cx="230" cy="230" r="34"/>
  </g>
  <g font-family="Inter, Arial, sans-serif" text-anchor="middle">
    <text x="230" y="227" font-size="9" fill="#fff">CBD</text>
    <text x="230" y="237" font-size="7" fill="#fff">central</text>
    <text x="230" y="200" font-size="9" fill="#3a2418">Transition</text>
    <text x="230" y="162" font-size="9" fill="#3a2418">Working-class</text>
    <text x="230" y="122" font-size="9" fill="#3a2418">Residential</text>
    <text x="230" y="52" font-size="9" fill="#2d4023">Commuter</text>
  </g>
  <g stroke="#7a5a3a" stroke-width="1.5" stroke-dasharray="5 3" fill="none">
    <path d="M264 230 L470 230"/>
  </g>
  <g font-family="Inter, Arial, sans-serif" font-size="12" fill="#222">
    <text x="490" y="100" font-weight="bold" font-size="13" fill="#444">Legend</text>
    <rect x="490" y="112" width="18" height="14" fill="#8a4a3a"/>
    <text x="516" y="124">Central business district</text>
    <rect x="490" y="134" width="18" height="14" fill="#c89461"/>
    <text x="516" y="146">Transition zone (slums, industry)</text>
    <rect x="490" y="156" width="18" height="14" fill="#d9b896"/>
    <text x="516" y="168">Working-class homes</text>
    <rect x="490" y="178" width="18" height="14" fill="#e8d9a8"/>
    <text x="516" y="190">Residential zone</text>
    <rect x="490" y="200" width="18" height="14" fill="#dbe7d4"/>
    <text x="516" y="212">Commuter zone / suburbs</text>
  </g>
  <text x="490" y="250" font-family="Inter, Arial, sans-serif" font-size="11" fill="#555">Competition for scarce urban</text>
  <text x="490" y="266" font-family="Inter, Arial, sans-serif" font-size="11" fill="#555">land sorts groups outward.</text>
  <text x="490" y="282" font-family="Inter, Arial, sans-serif" font-size="11" fill="#555">The model fits monocentric</text>
  <text x="490" y="298" font-family="Inter, Arial, sans-serif" font-size="11" fill="#555">cities poorly and ignores</text>
  <text x="490" y="314" font-family="Inter, Arial, sans-serif" font-size="11" fill="#555">politics and culture.</text>
  <text x="360" y="445" text-anchor="middle" font-family="Inter, Arial, sans-serif" font-size="13" fill="#222">Burgess concentric zone model (Chicago School, 1925)</text>
</svg>
