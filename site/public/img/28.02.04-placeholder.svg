<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 500" width="800" height="500">
  <rect width="800" height="500" fill="#f8f8f8"/>
  <text x="400" y="32" text-anchor="middle" font-family="sans-serif" font-size="16" fill="#333">Stellar Endpoints — Placeholder</text>

  <!-- Column headers -->
  <text x="140" y="74" text-anchor="middle" font-family="sans-serif" font-size="13" font-weight="bold" fill="#37474f">White dwarf</text>
  <text x="400" y="74" text-anchor="middle" font-family="sans-serif" font-size="13" font-weight="bold" fill="#37474f">Neutron star</text>
  <text x="660" y="74" text-anchor="middle" font-family="sans-serif" font-size="13" font-weight="bold" fill="#37474f">Black hole</text>

  <!-- Dividing limit lines between the three regimes -->
  <line x1="270" y1="160" x2="270" y2="372" stroke="#bdbdbd" stroke-width="1.5" stroke-dasharray="5 5"/>
  <line x1="530" y1="160" x2="530" y2="372" stroke="#bdbdbd" stroke-width="1.5" stroke-dasharray="5 5"/>

  <!-- White dwarf: Earth-sized degenerate ember -->
  <circle cx="140" cy="210" r="42" fill="#eceff1" stroke="#607d8b" stroke-width="2"/>
  <text x="140" y="285" text-anchor="middle" font-family="sans-serif" font-size="11" fill="#444">Earth-sized (~10^4 km)</text>

  <!-- Neutron star: tiny, with pulsar beams -->
  <line x1="368" y1="138" x2="432" y2="282" stroke="#1565c0" stroke-width="3" opacity="0.55"/>
  <line x1="432" y1="138" x2="368" y2="282" stroke="#1565c0" stroke-width="3" opacity="0.55"/>
  <circle cx="400" cy="210" r="13" fill="#3e2723" stroke="#000" stroke-width="1.5"/>
  <text x="400" y="285" text-anchor="middle" font-family="sans-serif" font-size="11" fill="#444">~20 km</text>

  <!-- Black hole: event horizon + photon ring + accretion disk -->
  <ellipse cx="660" cy="210" rx="60" ry="13" fill="none" stroke="#ffb74d" stroke-width="5" opacity="0.85"/>
  <circle cx="660" cy="210" r="50" fill="none" stroke="#fb8c00" stroke-width="3"/>
  <circle cx="660" cy="210" r="42" fill="#141414"/>
  <text x="660" y="285" text-anchor="middle" font-family="sans-serif" font-size="11" fill="#444">R_s = 2GM/c^2</text>

  <!-- Progenitor mass row -->
  <text x="140" y="322" text-anchor="middle" font-family="sans-serif" font-size="11" fill="#5d4037">below ~8 M_sun</text>
  <text x="400" y="322" text-anchor="middle" font-family="sans-serif" font-size="11" fill="#5d4037">~8 to ~25 M_sun</text>
  <text x="660" y="322" text-anchor="middle" font-family="sans-serif" font-size="11" fill="#5d4037">above ~25 M_sun</text>

  <!-- Support mechanism row -->
  <text x="140" y="345" text-anchor="middle" font-family="sans-serif" font-size="10" fill="#666">electron degeneracy</text>
  <text x="400" y="345" text-anchor="middle" font-family="sans-serif" font-size="10" fill="#666">neutron degeneracy</text>
  <text x="660" y="345" text-anchor="middle" font-family="sans-serif" font-size="10" fill="#666">none — total collapse</text>

  <!-- Limit labels on the dividers -->
  <text x="270" y="392" text-anchor="middle" font-family="sans-serif" font-size="10" fill="#1565c0">M_Ch ≈ 1.4 M_sun</text>
  <text x="270" y="406" text-anchor="middle" font-family="sans-serif" font-size="9" fill="#888">Chandrasekhar limit</text>
  <text x="530" y="392" text-anchor="middle" font-family="sans-serif" font-size="10" fill="#1565c0">M_TOV ≈ 2–3 M_sun</text>
  <text x="530" y="406" text-anchor="middle" font-family="sans-serif" font-size="9" fill="#888">Tolman-Oppenheimer-Volkoff</text>

  <!-- Progenitor-mass axis -->
  <defs>
    <marker id="axisArrow" markerWidth="9" markerHeight="9" refX="7" refY="4.5" orient="auto">
      <path d="M0,0 L9,4.5 L0,9 z" fill="#888"/>
    </marker>
  </defs>
  <line x1="90" y1="438" x2="710" y2="438" stroke="#999" stroke-width="1.5" marker-end="url(#axisArrow)"/>
  <text x="400" y="458" text-anchor="middle" font-family="sans-serif" font-size="11" fill="#666">increasing progenitor mass</text>
  <text x="400" y="482" text-anchor="middle" font-family="sans-serif" font-size="10" fill="#aaa">28.02.04</text>
</svg>
