<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 720 360" role="img" aria-labelledby="title desc">
  <title id="title">Pointer: Elliptic Cohomology</title>
  <desc id="desc">A schematic placeholder showing the chromatic tower from ordinary cohomology at height 0 through K-theory at height 1 to elliptic cohomology at height 2 and Morava theories at higher heights.</desc>
  <rect width="720" height="360" fill="#f5f1e9"/>
  <line x1="80" y1="270" x2="640" y2="270" stroke="#222" stroke-width="3"/>
  <g fill="#2f5f89">
    <circle cx="120" cy="270" r="9"/>
    <circle cx="280" cy="270" r="9"/>
    <circle cx="440" cy="270" r="9"/>
    <circle cx="600" cy="270" r="9"/>
  </g>
  <g font-family="Inter, Arial, sans-serif" font-size="14" fill="#222" text-anchor="middle">
    <text x="120" y="295">height 0</text>
    <text x="280" y="295">height 1</text>
    <text x="440" y="295">height 2</text>
    <text x="600" y="295">height n</text>
    <text x="120" y="250">HZ</text>
    <text x="280" y="250">K-theory</text>
    <text x="440" y="250">TMF</text>
    <text x="600" y="250">Morava En</text>
  </g>
  <path d="M120 130 C220 60 340 200 440 100 S580 180 600 150" fill="none" stroke="#7a4f9a" stroke-width="6" stroke-linecap="round"/>
  <text x="360" y="60" text-anchor="middle" font-family="Inter, Arial, sans-serif" font-size="16" fill="#7a4f9a">formal group law of MU = universal</text>
  <text x="360" y="335" text-anchor="middle" font-family="Inter, Arial, sans-serif" font-size="20" fill="#222">Pointer: Elliptic Cohomology</text>
</svg>
