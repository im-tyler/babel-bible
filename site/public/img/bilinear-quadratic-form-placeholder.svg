<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 960 420" role="img" aria-labelledby="title desc">
  <title id="title">Bilinear and quadratic form geometry</title>
  <desc id="desc">Vectors on a plane feeding into a measuring rule, with ellipses representing level sets of a quadratic form.</desc>
  <rect width="960" height="420" fill="#f8fafc"/>
  <g stroke="#d1d5db" stroke-width="1">
    <path d="M90 330 H500"/><path d="M90 280 H500"/><path d="M90 230 H500"/><path d="M90 180 H500"/><path d="M90 130 H500"/>
    <path d="M150 90 V350"/><path d="M200 90 V350"/><path d="M250 90 V350"/><path d="M300 90 V350"/><path d="M350 90 V350"/><path d="M400 90 V350"/><path d="M450 90 V350"/>
  </g>
  <g stroke="#0f172a" stroke-width="3"><path d="M90 230 H500"/><path d="M250 350 V90"/></g>
  <defs>
    <marker id="bq-blue" markerWidth="10" markerHeight="10" refX="8" refY="5" orient="auto"><path d="M1 1 L9 5 L1 9 Z" fill="#2563eb"/></marker>
    <marker id="bq-red" markerWidth="10" markerHeight="10" refX="8" refY="5" orient="auto"><path d="M1 1 L9 5 L1 9 Z" fill="#dc2626"/></marker>
  </defs>
  <g fill="none" stroke-linecap="round" stroke-width="6">
    <path d="M250 230 L385 145" stroke="#2563eb" marker-end="url(#bq-blue)"/>
    <path d="M250 230 L330 300" stroke="#dc2626" marker-end="url(#bq-red)"/>
  </g>
  <g fill="none" stroke="#059669" stroke-width="4">
    <ellipse cx="715" cy="220" rx="150" ry="72" transform="rotate(-18 715 220)"/>
    <ellipse cx="715" cy="220" rx="98" ry="47" transform="rotate(-18 715 220)"/>
    <ellipse cx="715" cy="220" rx="48" ry="23" transform="rotate(-18 715 220)"/>
  </g>
  <path d="M522 220 H595" stroke="#7c3aed" stroke-width="6" marker-end="url(#bq-blue)"/>
  <g font-family="Inter, Arial, sans-serif" fill="#0f172a">
    <text x="82" y="58" font-size="30" font-weight="700">two inputs, one scalar measurement</text>
    <text x="520" y="205" font-size="22" font-weight="700" fill="#7c3aed">B(v,w)</text>
    <text x="645" y="350" font-size="19">quadratic level sets Q(v)=constant</text>
    <text x="385" y="137" font-size="20" fill="#2563eb" font-weight="700">v</text>
    <text x="335" y="316" font-size="20" fill="#dc2626" font-weight="700">w</text>
  </g>
</svg>
