<svg xmlns="http://www.w3.org/2000/svg" width="720" height="420" viewBox="0 0 720 420" role="img" aria-labelledby="title desc">
  <title id="title">A function sends each input to one output</title>
  <desc id="desc">Three input dots on the left each have one arrow pointing to an output dot on the right.</desc>
  <rect width="720" height="420" fill="#f7f3ea"/>
  <rect x="70" y="70" width="190" height="280" rx="18" fill="#d8ecff" stroke="#2f5f89" stroke-width="4"/>
  <rect x="460" y="70" width="190" height="280" rx="18" fill="#e7ded2" stroke="#7a5a3a" stroke-width="4"/>
  <text x="165" y="45" text-anchor="middle" font-family="Arial, sans-serif" font-size="26" fill="#203040">Inputs</text>
  <text x="555" y="45" text-anchor="middle" font-family="Arial, sans-serif" font-size="26" fill="#203040">Outputs</text>
  <g fill="#315f8c" stroke="#17354f" stroke-width="3">
    <circle cx="160" cy="130" r="20"/>
    <circle cx="160" cy="210" r="20"/>
    <circle cx="160" cy="290" r="20"/>
  </g>
  <g fill="#a9673b" stroke="#5c351e" stroke-width="3">
    <circle cx="555" cy="120" r="20"/>
    <circle cx="555" cy="210" r="20"/>
    <circle cx="555" cy="300" r="20"/>
  </g>
  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="8" markerHeight="8" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#39424e"/>
    </marker>
  </defs>
  <g fill="none" stroke="#39424e" stroke-width="5" marker-end="url(#arrow)">
    <path d="M 185 130 C 290 95, 405 95, 530 120"/>
    <path d="M 185 210 C 300 210, 410 210, 530 210"/>
    <path d="M 185 290 C 300 330, 415 330, 530 300"/>
  </g>
  <text x="160" y="137" text-anchor="middle" font-family="Arial, sans-serif" font-size="18" fill="#fff">1</text>
  <text x="160" y="217" text-anchor="middle" font-family="Arial, sans-serif" font-size="18" fill="#fff">2</text>
  <text x="160" y="297" text-anchor="middle" font-family="Arial, sans-serif" font-size="18" fill="#fff">3</text>
  <text x="555" y="127" text-anchor="middle" font-family="Arial, sans-serif" font-size="18" fill="#fff">A</text>
  <text x="555" y="217" text-anchor="middle" font-family="Arial, sans-serif" font-size="18" fill="#fff">B</text>
  <text x="555" y="307" text-anchor="middle" font-family="Arial, sans-serif" font-size="18" fill="#fff">C</text>
  <text x="360" y="384" text-anchor="middle" font-family="Arial, sans-serif" font-size="22" fill="#203040">One arrow leaves each input.</text>
</svg>
