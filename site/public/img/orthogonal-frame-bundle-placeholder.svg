<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 720 360" role="img" aria-labelledby="title desc">
  <title id="title">Orthogonal frame bundle</title>
  <desc id="desc">A curved base with small perpendicular frame arrows attached at several points.</desc>
  <rect width="720" height="360" fill="#f7f7f2"/>
  <path d="M80 250 C190 170 310 300 430 210 C530 135 600 195 660 145" fill="none" stroke="#2f5873" stroke-width="5"/>
  <g stroke-width="4" stroke-linecap="round">
    <path d="M185 206 L235 186" stroke="#7a5a24" marker-end="url(#arrow-brown)"/>
    <path d="M185 206 L202 254" stroke="#315f3c" marker-end="url(#arrow-green)"/>
    <path d="M390 233 L442 229" stroke="#7a5a24" marker-end="url(#arrow-brown)"/>
    <path d="M390 233 L386 285" stroke="#315f3c" marker-end="url(#arrow-green)"/>
    <path d="M560 170 L608 151" stroke="#7a5a24" marker-end="url(#arrow-brown)"/>
    <path d="M560 170 L579 218" stroke="#315f3c" marker-end="url(#arrow-green)"/>
  </g>
  <text x="95" y="305" font-family="Arial, sans-serif" font-size="22" fill="#193143">base manifold</text>
  <text x="450" y="92" font-family="Arial, sans-serif" font-size="22" fill="#463414">orthonormal frames</text>
  <defs>
    <marker id="arrow-brown" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#7a5a24"/>
    </marker>
    <marker id="arrow-green" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#315f3c"/>
    </marker>
  </defs>
</svg>
