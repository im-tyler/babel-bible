<svg xmlns="http://www.w3.org/2000/svg" width="960" height="540" viewBox="0 0 960 540" role="img" aria-labelledby="title desc">
  <title id="title">Chern-Weil homomorphism visual</title>
  <desc id="desc">A curved bundle gauge meter turns local curvature into a global cohomology class.</desc>
  <rect width="960" height="540" fill="#f7f3ea"/>
  <path d="M80 385 C210 310 315 435 455 355 C610 266 735 314 880 232" fill="none" stroke="#2f4858" stroke-width="10" stroke-linecap="round"/>
  <path d="M80 422 C220 347 326 472 468 392 C615 309 745 351 880 276" fill="none" stroke="#86bbd8" stroke-width="5" stroke-linecap="round"/>
  <g transform="translate(180 112)">
    <circle cx="0" cy="0" r="66" fill="#fff" stroke="#2f4858" stroke-width="5"/>
    <path d="M0 -44 C30 -31 42 3 23 31 C-4 47 -39 34 -47 2 C-41 -29 -25 -43 0 -44Z" fill="#f6ae2d" opacity=".9"/>
    <text x="0" y="105" text-anchor="middle" font-family="Arial, sans-serif" font-size="28" fill="#2f4858">curvature</text>
  </g>
  <g transform="translate(472 108)">
    <rect x="-84" y="-62" width="168" height="124" rx="12" fill="#fff" stroke="#2f4858" stroke-width="5"/>
    <circle cx="-34" cy="-8" r="18" fill="#f26419"/>
    <circle cx="30" cy="-8" r="18" fill="#86bbd8"/>
    <path d="M-52 38 H52" stroke="#2f4858" stroke-width="5" stroke-linecap="round"/>
    <text x="0" y="105" text-anchor="middle" font-family="Arial, sans-serif" font-size="28" fill="#2f4858">invariant rule</text>
  </g>
  <g transform="translate(760 112)">
    <circle cx="0" cy="0" r="68" fill="#fff" stroke="#2f4858" stroke-width="5"/>
    <path d="M-44 16 C-18 -42 26 -42 46 4 C15 -15 -16 -12 -44 16Z" fill="#33658a" opacity=".92"/>
    <path d="M-44 16 C-10 52 31 46 46 4" fill="none" stroke="#f26419" stroke-width="7" stroke-linecap="round"/>
    <text x="0" y="105" text-anchor="middle" font-family="Arial, sans-serif" font-size="28" fill="#2f4858">global class</text>
  </g>
  <path d="M265 112 H360" stroke="#2f4858" stroke-width="5" stroke-linecap="round" marker-end="url(#arrow)"/>
  <path d="M565 112 H655" stroke="#2f4858" stroke-width="5" stroke-linecap="round" marker-end="url(#arrow)"/>
  <defs>
    <marker id="arrow" markerWidth="12" markerHeight="12" refX="10" refY="6" orient="auto">
      <path d="M0 0 L12 6 L0 12 Z" fill="#2f4858"/>
    </marker>
  </defs>
</svg>
