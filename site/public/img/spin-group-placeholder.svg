<svg xmlns="http://www.w3.org/2000/svg" width="900" height="460" viewBox="0 0 900 460" role="img" aria-labelledby="title desc">
  <title id="title">Spin group double covering SO(n)</title>
  <desc id="desc">Two points in Spin map to one rotation in SO, with unit vectors in a Clifford algebra producing reflections and even products producing rotations.</desc>
  <rect width="900" height="460" fill="#f7f7f3"/>
  <g transform="translate(78 76)">
    <rect x="0" y="0" width="292" height="270" rx="8" fill="#ffffff" stroke="#1f2933" stroke-width="3"/>
    <text x="146" y="44" text-anchor="middle" font-family="Inter, Arial, sans-serif" font-size="28" fill="#1f2933">Spin(n)</text>
    <circle cx="100" cy="136" r="38" fill="#dbeafe" stroke="#2563eb" stroke-width="4"/>
    <circle cx="192" cy="136" r="38" fill="#dbeafe" stroke="#2563eb" stroke-width="4"/>
    <text x="100" y="144" text-anchor="middle" font-family="Inter, Arial, sans-serif" font-size="26" fill="#1f2933">g</text>
    <text x="192" y="144" text-anchor="middle" font-family="Inter, Arial, sans-serif" font-size="26" fill="#1f2933">-g</text>
    <path d="M94 214 C130 246 162 246 198 214" fill="none" stroke="#64748b" stroke-width="4"/>
    <text x="146" y="256" text-anchor="middle" font-family="Inter, Arial, sans-serif" font-size="18" fill="#475569">even Clifford products</text>
  </g>
  <g transform="translate(530 76)">
    <rect x="0" y="0" width="292" height="270" rx="8" fill="#ffffff" stroke="#1f2933" stroke-width="3"/>
    <text x="146" y="44" text-anchor="middle" font-family="Inter, Arial, sans-serif" font-size="28" fill="#1f2933">SO(n)</text>
    <circle cx="146" cy="136" r="62" fill="#dcfce7" stroke="#16a34a" stroke-width="4"/>
    <path d="M118 148 L146 96 L174 148 Z" fill="none" stroke="#15803d" stroke-width="5" stroke-linejoin="round"/>
    <path d="M188 106 A58 58 0 1 1 104 100" fill="none" stroke="#15803d" stroke-width="4"/>
    <path d="M104 100 L119 98 L111 112" fill="#15803d"/>
    <text x="146" y="232" text-anchor="middle" font-family="Inter, Arial, sans-serif" font-size="18" fill="#475569">orientation-preserving rotations</text>
  </g>
  <g fill="none" stroke="#334155" stroke-width="5" stroke-linecap="round">
    <path d="M288 198 C370 130 470 130 552 198"/>
    <path d="M288 198 C370 266 470 266 552 198"/>
  </g>
  <g fill="#334155">
    <path d="M552 198 l-18 -10 l3 20 z"/>
    <path d="M552 198 l-18 -10 l3 20 z" transform="rotate(32 552 198)"/>
  </g>
  <text x="450" y="132" text-anchor="middle" font-family="Inter, Arial, sans-serif" font-size="22" fill="#1f2933">rho</text>
  <text x="450" y="337" text-anchor="middle" font-family="Inter, Arial, sans-serif" font-size="22" fill="#1f2933">two preimages for each rotation</text>
  <line x1="84" y1="392" x2="816" y2="392" stroke="#cbd5e1" stroke-width="3"/>
  <text x="450" y="428" text-anchor="middle" font-family="Inter, Arial, sans-serif" font-size="20" fill="#475569">Unit vectors give reflections; even products give rotations.</text>
</svg>
