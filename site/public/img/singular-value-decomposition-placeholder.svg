<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 720 360" role="img" aria-labelledby="title desc">
  <title id="title">Singular Value Decomposition</title>
  <desc id="desc">A schematic placeholder diagram for Singular Value Decomposition: an input unit disk is rotated by V-star, stretched along the coordinate axes by Sigma to form an ellipse with semi-axes sigma_1 and sigma_2, and rotated again by U to its final position.</desc>
  <rect width="720" height="360" fill="#f3f1ea"/>
  <g fill="none" stroke="#2c4a6f" stroke-width="3">
    <circle cx="110" cy="180" r="70"/>
  </g>
  <g fill="none" stroke="#2c4a6f" stroke-width="2" opacity="0.6">
    <line x1="110" y1="110" x2="110" y2="250"/>
    <line x1="40" y1="180" x2="180" y2="180"/>
  </g>
  <g fill="none" stroke="#2c4a6f" stroke-width="3">
    <circle cx="310" cy="180" r="70"/>
  </g>
  <g stroke="#b85a1e" stroke-width="3" fill="none">
    <line x1="240" y1="180" x2="380" y2="180"/>
    <line x1="310" y1="145" x2="310" y2="215"/>
  </g>
  <g fill="none" stroke="#2c4a6f" stroke-width="3">
    <ellipse cx="510" cy="180" rx="100" ry="40"/>
  </g>
  <g stroke="#b85a1e" stroke-width="3" fill="none">
    <line x1="410" y1="180" x2="610" y2="180"/>
    <line x1="510" y1="140" x2="510" y2="220"/>
  </g>
  <g fill="none" stroke="#2c4a6f" stroke-width="3">
    <ellipse cx="640" cy="180" rx="60" ry="24" transform="rotate(-25 640 180)"/>
  </g>
  <g stroke="#b85a1e" stroke-width="2" fill="none">
    <line x1="585" y1="206" x2="695" y2="155"/>
    <line x1="630" y1="155" x2="650" y2="205"/>
  </g>
  <g fill="#222" font-family="Inter, Arial, sans-serif" font-size="20">
    <text x="110" y="305" text-anchor="middle">unit disk</text>
    <text x="310" y="305" text-anchor="middle">V* rotates</text>
    <text x="510" y="305" text-anchor="middle">Sigma stretches</text>
    <text x="640" y="305" text-anchor="middle">U rotates</text>
  </g>
  <g fill="#2c4a6f" font-family="Inter, Arial, sans-serif" font-size="18">
    <text x="210" y="180" text-anchor="middle">→</text>
    <text x="410" y="180" text-anchor="middle">→</text>
    <text x="588" y="180" text-anchor="middle">→</text>
  </g>
  <text x="360" y="50" text-anchor="middle" font-family="Inter, Arial, sans-serif" font-size="26" fill="#222">A = U Σ V*</text>
  <text x="360" y="340" text-anchor="middle" font-family="Inter, Arial, sans-serif" font-size="14" fill="#555">singular values σ₁ ≥ σ₂ ≥ … ≥ σ_r &gt; 0 are the semi-axes of the image ellipsoid</text>
</svg>
