<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 500" width="800" height="500">
  <defs>
    <marker id="arrS" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M0,0 L10,5 L0,10 z" fill="#999"/>
    </marker>
    <marker id="arrFB" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M0,0 L10,5 L0,10 z" fill="#c62828"/>
    </marker>
  </defs>
  <rect width="800" height="500" fill="#f8f8f8"/>
  <text x="400" y="30" text-anchor="middle" font-family="sans-serif" font-size="16" fill="#333">Stress and Health — Placeholder</text>

  <!-- Left panel: General Adaptation Syndrome curve -->
  <rect x="30" y="55" width="370" height="395" rx="4" fill="#fff" stroke="#bbb" stroke-width="1"/>
  <text x="215" y="76" text-anchor="middle" font-family="sans-serif" font-size="12" fill="#555">General Adaptation Syndrome (Selye)</text>
  <text x="215" y="90" text-anchor="middle" font-family="sans-serif" font-size="10" fill="#888">resistance to stress over time</text>

  <!-- Axes -->
  <line x1="70" y1="380" x2="70" y2="110" stroke="#999" stroke-width="1"/>
  <line x1="70" y1="380" x2="380" y2="380" stroke="#999" stroke-width="1"/>
  <text x="62" y="120" text-anchor="end" font-family="sans-serif" font-size="9" fill="#888">high</text>
  <text x="62" y="383" text-anchor="end" font-family="sans-serif" font-size="9" fill="#888">low</text>
  <text x="55" y="245" text-anchor="middle" font-family="sans-serif" font-size="10" fill="#666" transform="rotate(-90 55 245)">Resistance</text>
  <text x="225" y="425" text-anchor="middle" font-family="sans-serif" font-size="10" fill="#666">Time</text>

  <!-- Baseline (normal) dashed -->
  <line x1="70" y1="320" x2="380" y2="320" stroke="#ddd" stroke-width="1" stroke-dasharray="4 3"/>
  <text x="375" y="316" text-anchor="end" font-family="sans-serif" font-size="8.5" fill="#aaa">baseline</text>

  <!-- GAS curve: alarm spike, resistance plateau, exhaustion drop -->
  <path d="M70,320 L100,150 L130,180 Q150,185 175,195 T260,205 Q300,210 320,240 Q345,300 370,365" fill="none" stroke="#1565c0" stroke-width="2.2"/>

  <!-- Phase labels with brackets -->
  <!-- Alarm -->
  <line x1="70" y1="392" x2="130" y2="392" stroke="#c62828" stroke-width="2"/>
  <text x="100" y="406" text-anchor="middle" font-family="sans-serif" font-size="9.5" fill="#c62828">Alarm</text>
  <!-- Resistance -->
  <line x1="135" y1="392" x2="290" y2="392" stroke="#ef6c00" stroke-width="2"/>
  <text x="212" y="406" text-anchor="middle" font-family="sans-serif" font-size="9.5" fill="#ef6c00">Resistance</text>
  <!-- Exhaustion -->
  <line x1="295" y1="392" x2="380" y2="392" stroke="#6a1b9a" stroke-width="2"/>
  <text x="337" y="406" text-anchor="middle" font-family="sans-serif" font-size="9.5" fill="#6a1b9a">Exhaustion</text>

  <!-- Annotations on curve -->
  <text x="108" y="142" font-family="sans-serif" font-size="8.5" fill="#c62828">shock / countershock</text>
  <text x="195" y="222" font-family="sans-serif" font-size="8.5" fill="#ef6c00">elevated cortisol</text>
  <text x="300" y="270" font-family="sans-serif" font-size="8.5" fill="#6a1b9a">immune collapse</text>

  <!-- Right panel: HPA axis pathway -->
  <rect x="420" y="55" width="360" height="395" rx="4" fill="#fff" stroke="#bbb" stroke-width="1"/>
  <text x="600" y="76" text-anchor="middle" font-family="sans-serif" font-size="12" fill="#555">HPA axis and SAM axis</text>
  <text x="600" y="90" text-anchor="middle" font-family="sans-serif" font-size="10" fill="#888">two stress-response cascades</text>

  <!-- SAM axis (left column, fast) -->
  <text x="475" y="115" text-anchor="middle" font-family="sans-serif" font-size="10" fill="#c62828">SAM (fast)</text>
  <rect x="425" y="125" width="100" height="30" rx="14" fill="#fdecea" stroke="#c62828" stroke-width="1.1"/>
  <text x="475" y="144" text-anchor="middle" font-family="sans-serif" font-size="9.5" fill="#c62828">Stressor</text>
  <rect x="425" y="180" width="100" height="30" rx="14" fill="#fdecea" stroke="#c62828" stroke-width="1.1"/>
  <text x="475" y="199" text-anchor="middle" font-family="sans-serif" font-size="9.5" fill="#c62828">Adrenal medulla</text>
  <rect x="425" y="235" width="100" height="30" rx="14" fill="#fdecea" stroke="#c62828" stroke-width="1.1"/>
  <text x="475" y="254" text-anchor="middle" font-family="sans-serif" font-size="9.5" fill="#c62828">Adrenaline / NE</text>
  <rect x="425" y="290" width="100" height="30" rx="14" fill="#fdecea" stroke="#c62828" stroke-width="1.1"/>
  <text x="475" y="304" text-anchor="middle" font-family="sans-serif" font-size="9" fill="#c62828">Fight or flight</text>

  <line x1="475" y1="155" x2="475" y2="178" stroke="#999" stroke-width="1.4" marker-end="url(#arrS)"/>
  <line x1="475" y1="210" x2="475" y2="233" stroke="#999" stroke-width="1.4" marker-end="url(#arrS)"/>
  <line x1="475" y1="265" x2="475" y2="288" stroke="#999" stroke-width="1.4" marker-end="url(#arrS)"/>

  <!-- HPA axis (right column, slower) -->
  <text x="660" y="115" text-anchor="middle" font-family="sans-serif" font-size="10" fill="#1565c0">HPA (slower)</text>
  <rect x="610" y="125" width="100" height="30" rx="14" fill="#e3f2fd" stroke="#1565c0" stroke-width="1.1"/>
  <text x="660" y="144" text-anchor="middle" font-family="sans-serif" font-size="9.5" fill="#1565c0">Hypothalamus</text>
  <rect x="610" y="180" width="100" height="30" rx="14" fill="#e3f2fd" stroke="#1565c0" stroke-width="1.1"/>
  <text x="660" y="199" text-anchor="middle" font-family="sans-serif" font-size="9.5" fill="#1565c0">Pituitary (ACTH)</text>
  <rect x="610" y="235" width="100" height="30" rx="14" fill="#e3f2fd" stroke="#1565c0" stroke-width="1.1"/>
  <text x="660" y="254" text-anchor="middle" font-family="sans-serif" font-size="9.5" fill="#1565c0">Adrenal cortex</text>
  <rect x="610" y="290" width="100" height="30" rx="14" fill="#e3f2fd" stroke="#1565c0" stroke-width="1.1"/>
  <text x="660" y="304" text-anchor="middle" font-family="sans-serif" font-size="9.5" fill="#1565c0">Cortisol</text>

  <line x1="660" y1="155" x2="660" y2="178" stroke="#999" stroke-width="1.4" marker-end="url(#arrS)"/>
  <line x1="660" y1="210" x2="660" y2="233" stroke="#999" stroke-width="1.4" marker-end="url(#arrS)"/>
  <line x1="660" y1="265" x2="660" y2="288" stroke="#999" stroke-width="1.4" marker-end="url(#arrS)"/>

  <!-- Feedback loop: cortisol -> hypothalamus (negative feedback) -->
  <path d="M710,305 Q765,305 765,140 Q765,125 712,140" fill="none" stroke="#c62828" stroke-width="1.4" stroke-dasharray="5 3" marker-end="url(#arrFB)"/>
  <text x="772" y="225" font-family="sans-serif" font-size="8" fill="#c62828" transform="rotate(90 772 225)">negative feedback</text>

  <!-- Allostatic load annotation -->
  <rect x="440" y="345" width="320" height="75" rx="4" fill="#fafafa" stroke="#ddd" stroke-width="1"/>
  <text x="600" y="363" text-anchor="middle" font-family="sans-serif" font-size="10" fill="#555">Allostatic load (McEwen-Stellar 1993)</text>
  <text x="600" y="380" text-anchor="middle" font-family="sans-serif" font-size="8.5" fill="#888">wear and tear from chronic activation of</text>
  <text x="600" y="393" text-anchor="middle" font-family="sans-serif" font-size="8.5" fill="#888">cortisol, sympathetic, metabolic systems</text>
  <text x="600" y="408" text-anchor="middle" font-family="sans-serif" font-size="8.5" fill="#888">composite: BP, cortisol, waist-hip, HDL, ...</text>

  <text x="400" y="478" text-anchor="middle" font-family="sans-serif" font-size="9" fill="#888">29.11.03</text>
</svg>
