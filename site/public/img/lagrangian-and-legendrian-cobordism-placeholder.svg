<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 720 360" role="img" aria-labelledby="title desc">
  <title id="title">Lagrangian and Legendrian Cobordism</title>
  <desc id="desc">A Lagrangian cobordism strip Lambda inside M cross R-squared with cylindrical ends asymptotic to L0 at minus infinity and L1 at plus infinity, drawn as a deformation from a simple circle to a figure eight along the cobordism direction.</desc>
  <rect width="720" height="360" fill="#f4f4ec"/>
  <g stroke="#5a3d6f" stroke-width="1" fill="none" opacity="0.25">
    <line x1="60" y1="200" x2="660" y2="200"/>
    <line x1="60" y1="60" x2="60" y2="340"/>
    <line x1="660" y1="60" x2="660" y2="340"/>
  </g>
  <text x="40" y="206" font-family="Inter, Arial, sans-serif" font-size="13" fill="#5a3d6f" text-anchor="end">M × ℝ²</text>
  <text x="40" y="60" font-family="Inter, Arial, sans-serif" font-size="12" fill="#5a3d6f" text-anchor="end">t = −∞</text>
  <text x="680" y="60" font-family="Inter, Arial, sans-serif" font-size="12" fill="#5a3d6f">t = +∞</text>
  <g fill="none" stroke="#3a7d4d" stroke-width="2" opacity="0.85">
    <ellipse cx="120" cy="200" rx="30" ry="50"/>
  </g>
  <text x="120" y="280" text-anchor="middle" font-family="Inter, Arial, sans-serif" font-size="13" fill="#3a7d4d">L₀ (circle)</text>
  <g fill="none" stroke="#d68a3a" stroke-width="2" opacity="0.85">
    <path d="M 600 150 C 580 180 620 180 600 200 C 580 220 620 220 600 250 C 580 220 620 220 600 200 C 580 180 620 180 600 150 Z"/>
  </g>
  <text x="600" y="280" text-anchor="middle" font-family="Inter, Arial, sans-serif" font-size="13" fill="#d68a3a">L₁ (figure 8)</text>
  <g fill="none" stroke="#5a3d6f" stroke-width="1.8" opacity="0.75">
    <path d="M 150 150 C 260 152 360 130 480 138 C 540 142 580 148 600 150"/>
    <path d="M 150 250 C 260 248 360 270 480 262 C 540 258 580 252 600 250"/>
    <path d="M 240 180 Q 360 200 480 220"/>
    <path d="M 240 220 Q 360 200 480 180"/>
  </g>
  <text x="370" y="180" text-anchor="middle" font-family="Inter, Arial, sans-serif" font-size="14" fill="#5a3d6f">Λ ⊂ M × ℝ², ω|Λ = 0</text>
  <text x="370" y="240" text-anchor="middle" font-family="Inter, Arial, sans-serif" font-size="12" fill="#5a3d6f">Polterovich surgery at transverse double point</text>
  <g fill="#d68a3a" opacity="0.9">
    <circle cx="370" cy="200" r="4"/>
  </g>
  <rect x="40" y="40" width="220" height="40" fill="none" stroke="#5a3d6f" stroke-width="1"/>
  <text x="150" y="65" text-anchor="middle" font-family="Inter, Arial, sans-serif" font-size="12" fill="#222">Lagrangian cobordism Λ : L₀ ⇝ L₁</text>
  <rect x="460" y="40" width="220" height="40" fill="none" stroke="#d68a3a" stroke-width="1"/>
  <text x="570" y="65" text-anchor="middle" font-family="Inter, Arial, sans-serif" font-size="12" fill="#222">μ ∈ H¹(Λ;ℤ): cobordism invariant</text>
  <text x="370" y="330" text-anchor="middle" font-family="Inter, Arial, sans-serif" font-size="12" fill="#555">Arnold 1980; Eliashberg 1984; Audin 1985; Biran-Cornea 2013</text>
</svg>
