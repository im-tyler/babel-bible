<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 960 420" role="img" aria-labelledby="title desc">
  <title id="title">Vector space operations</title>
  <desc id="desc">A plane with arrows showing vector addition and scalar stretching while staying in the same space.</desc>
  <rect width="960" height="420" fill="#f8fafc"/>
  <defs>
    <marker id="arrow-blue" markerWidth="12" markerHeight="12" refX="10" refY="6" orient="auto">
      <path d="M1 1 L11 6 L1 11 Z" fill="#2563eb"/>
    </marker>
    <marker id="arrow-red" markerWidth="12" markerHeight="12" refX="10" refY="6" orient="auto">
      <path d="M1 1 L11 6 L1 11 Z" fill="#dc2626"/>
    </marker>
    <marker id="arrow-green" markerWidth="12" markerHeight="12" refX="10" refY="6" orient="auto">
      <path d="M1 1 L11 6 L1 11 Z" fill="#059669"/>
    </marker>
  </defs>
  <g stroke="#cbd5e1" stroke-width="1">
    <path d="M80 340 H880"/>
    <path d="M80 290 H880"/>
    <path d="M80 240 H880"/>
    <path d="M80 190 H880"/>
    <path d="M80 140 H880"/>
    <path d="M80 90 H880"/>
    <path d="M130 60 V360"/>
    <path d="M180 60 V360"/>
    <path d="M230 60 V360"/>
    <path d="M280 60 V360"/>
    <path d="M330 60 V360"/>
    <path d="M380 60 V360"/>
    <path d="M430 60 V360"/>
    <path d="M480 60 V360"/>
    <path d="M530 60 V360"/>
    <path d="M580 60 V360"/>
    <path d="M630 60 V360"/>
    <path d="M680 60 V360"/>
    <path d="M730 60 V360"/>
    <path d="M780 60 V360"/>
    <path d="M830 60 V360"/>
  </g>
  <g stroke="#0f172a" stroke-width="3">
    <path d="M80 240 H880"/>
    <path d="M280 360 V60"/>
  </g>
  <circle cx="280" cy="240" r="6" fill="#0f172a"/>
  <g fill="none" stroke-linecap="round" stroke-width="7">
    <path d="M280 240 L430 140" stroke="#2563eb" marker-end="url(#arrow-blue)"/>
    <path d="M430 140 L580 190" stroke="#dc2626" marker-end="url(#arrow-red)"/>
    <path d="M280 240 L580 190" stroke="#059669" marker-end="url(#arrow-green)"/>
    <path d="M660 270 L790 190" stroke="#7c3aed" stroke-width="5" marker-end="url(#arrow-blue)"/>
    <path d="M660 270 L855 150" stroke="#7c3aed" stroke-width="7" opacity="0.45" marker-end="url(#arrow-blue)"/>
  </g>
  <g font-family="Inter, Arial, sans-serif" fill="#0f172a">
    <text x="92" y="45" font-size="30" font-weight="700">vectors stay in the same world</text>
    <text x="94" y="386" font-size="18">addition combines arrows; scalar multiplication stretches arrows</text>
    <text x="442" y="129" font-size="21" font-weight="700" fill="#2563eb">v</text>
    <text x="593" y="187" font-size="21" font-weight="700" fill="#dc2626">w</text>
    <text x="593" y="214" font-size="21" font-weight="700" fill="#059669">v + w</text>
    <text x="802" y="151" font-size="21" font-weight="700" fill="#7c3aed">2u</text>
  </g>
</svg>
