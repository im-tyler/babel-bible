<svg xmlns="http://www.w3.org/2000/svg" width="960" height="540" viewBox="0 0 960 540" role="img" aria-labelledby="title desc">
  <title id="title">Bhabha scattering — t-channel exchange and s-channel annihilation tree diagrams with the CM angular distribution</title>
  <desc id="desc">Two QED tree-level Feynman diagrams for the elastic electron-positron process e plus plus e minus to e plus plus e minus: a t-channel diagram in which a single virtual photon of four-momentum p_1 minus p_3 is exchanged between the electron and positron lines (the incoming and outgoing positron carrying the second pair of vertices), and an s-channel annihilation diagram in which the incoming electron-positron pair fuses into a virtual photon of four-momentum p_1 plus p_2, which then re-creates the outgoing electron-positron pair. The total amplitude is the t-channel minus the s-channel, with the relative minus sign from fermion-line crossing. A polar plot below sketches the centre-of-mass differential cross section as a function of scattering angle theta: a sharp forward 1 over sine-to-the-fourth of theta over two Coulomb-like peak from the t-channel, a smooth 1 plus cos squared theta annihilation contribution from the s-channel, and a small s-t interference at intermediate angles. The high-energy spin-averaged squared amplitude and the centre-of-mass differential cross section are displayed.</desc>
  <rect width="960" height="540" fill="#f8faf7"/>

  <defs>
    <marker id="fermarrow" markerWidth="10" markerHeight="10" refX="8" refY="5" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L8,5 L0,10 z" fill="#264653"/>
    </marker>
    <marker id="posarrow" markerWidth="10" markerHeight="10" refX="2" refY="5" orient="auto" markerUnits="strokeWidth">
      <path d="M8,0 L0,5 L8,10 z" fill="#7b4b94"/>
    </marker>
  </defs>

  <text x="480" y="34" text-anchor="middle" font-family="Arial, sans-serif" font-size="24" fill="#23424a" font-weight="bold">Bhabha scattering — tree-level QED</text>
  <text x="480" y="58" text-anchor="middle" font-family="Arial, sans-serif" font-size="14" fill="#23424a">e⁻(p₁) + e⁺(p₂) → e⁻(p₃) + e⁺(p₄),  Mandelstam s + t + u = 4m²</text>

  <!-- t-channel diagram -->
  <text x="200" y="92" text-anchor="middle" font-family="Arial, sans-serif" font-size="18" fill="#23424a" font-weight="bold">t-channel exchange</text>
  <!-- incoming electron 1 (top left) -->
  <line x1="60" y1="130" x2="160" y2="160" stroke="#264653" stroke-width="2.2" marker-end="url(#fermarrow)"/>
  <text x="60" y="118" text-anchor="middle" font-family="Arial, sans-serif" font-size="13" fill="#264653">e⁻ (p₁)</text>
  <!-- outgoing electron 3 (top right) -->
  <line x1="160" y1="160" x2="340" y2="130" stroke="#264653" stroke-width="2.2" marker-end="url(#fermarrow)"/>
  <text x="350" y="124" text-anchor="middle" font-family="Arial, sans-serif" font-size="13" fill="#264653">e⁻ (p₃)</text>
  <!-- vertex 1 -->
  <circle cx="160" cy="160" r="3" fill="#23424a"/>
  <!-- internal photon (wavy) -->
  <path d="M160 160 q8 14 0 28 q-8 14 0 28 q8 14 0 28 q-8 14 0 28 q8 14 0 28" fill="none" stroke="#e76f51" stroke-width="2.2"/>
  <text x="120" y="232" text-anchor="middle" font-family="Arial, sans-serif" font-size="12" fill="#e76f51">γ* (q = p₁ − p₃)</text>
  <text x="120" y="252" text-anchor="middle" font-family="Arial, sans-serif" font-size="11" fill="#8a8a8a">∝ 1/t</text>
  <!-- vertex 2 -->
  <circle cx="160" cy="300" r="3" fill="#23424a"/>
  <!-- incoming positron 2 (bottom left): arrow reversed for antiparticle convention -->
  <line x1="60" y1="330" x2="160" y2="300" stroke="#7b4b94" stroke-width="2.2" marker-start="url(#posarrow)"/>
  <text x="60" y="350" text-anchor="middle" font-family="Arial, sans-serif" font-size="13" fill="#7b4b94">e⁺ (p₂)</text>
  <!-- outgoing positron 4 (bottom right): arrow reversed for antiparticle convention -->
  <line x1="160" y1="300" x2="340" y2="330" stroke="#7b4b94" stroke-width="2.2" marker-start="url(#posarrow)"/>
  <text x="350" y="346" text-anchor="middle" font-family="Arial, sans-serif" font-size="13" fill="#7b4b94">e⁺ (p₄)</text>
  <!-- amplitude label -->
  <text x="200" y="385" text-anchor="middle" font-family="Arial, sans-serif" font-size="12" fill="#23424a">𝓜_t = (−ie)² ū(p₃)γ^μ u(p₁) · (−iη_μν/t) · v̄(p₂)γ^ν v(p₄)</text>

  <!-- s-channel annihilation diagram -->
  <text x="600" y="92" text-anchor="middle" font-family="Arial, sans-serif" font-size="18" fill="#23424a" font-weight="bold">s-channel annihilation</text>
  <!-- incoming electron 1 (top left) -->
  <line x1="460" y1="130" x2="560" y2="230" stroke="#264653" stroke-width="2.2" marker-end="url(#fermarrow)"/>
  <text x="460" y="118" text-anchor="middle" font-family="Arial, sans-serif" font-size="13" fill="#264653">e⁻ (p₁)</text>
  <!-- incoming positron 2 (bottom left): arrow reversed -->
  <line x1="460" y1="330" x2="560" y2="230" stroke="#7b4b94" stroke-width="2.2" marker-start="url(#posarrow)"/>
  <text x="460" y="350" text-anchor="middle" font-family="Arial, sans-serif" font-size="13" fill="#7b4b94">e⁺ (p₂)</text>
  <!-- annihilation vertex -->
  <circle cx="560" cy="230" r="3" fill="#23424a"/>
  <!-- internal photon (wavy) horizontal -->
  <path d="M560 230 q14 -8 28 0 q14 8 28 0 q14 -8 28 0 q14 8 28 0 q14 -8 28 0" fill="none" stroke="#e76f51" stroke-width="2.2"/>
  <text x="700" y="218" text-anchor="middle" font-family="Arial, sans-serif" font-size="12" fill="#e76f51">γ* (q = p₁ + p₂)</text>
  <text x="700" y="252" text-anchor="middle" font-family="Arial, sans-serif" font-size="11" fill="#8a8a8a">∝ 1/s</text>
  <!-- pair-creation vertex -->
  <circle cx="700" cy="230" r="3" fill="#23424a"/>
  <!-- outgoing electron 3 (top right) -->
  <line x1="700" y1="230" x2="800" y2="130" stroke="#264653" stroke-width="2.2" marker-end="url(#fermarrow)"/>
  <text x="810" y="124" text-anchor="middle" font-family="Arial, sans-serif" font-size="13" fill="#264653">e⁻ (p₃)</text>
  <!-- outgoing positron 4 (bottom right): arrow reversed -->
  <line x1="700" y1="230" x2="800" y2="330" stroke="#7b4b94" stroke-width="2.2" marker-end="url(#posarrow)"/>
  <text x="810" y="346" text-anchor="middle" font-family="Arial, sans-serif" font-size="13" fill="#7b4b94">e⁺ (p₄)</text>
  <!-- amplitude label -->
  <text x="600" y="385" text-anchor="middle" font-family="Arial, sans-serif" font-size="12" fill="#23424a">𝓜_s = (−ie)² v̄(p₂)γ^μ u(p₁) · (−iη_μν/s) · ū(p₃)γ^ν v(p₄)</text>

  <!-- Total amplitude line -->
  <text x="480" y="415" text-anchor="middle" font-family="Arial, sans-serif" font-size="14" fill="#23424a" font-weight="bold">𝓜 = 𝓜_t − 𝓜_s   (fermion-line crossing sign)</text>

  <!-- Master formula box -->
  <rect x="40" y="440" width="880" height="78" fill="#ffffff" stroke="#23424a" stroke-width="1.2" rx="4"/>
  <text x="60" y="464" font-family="Arial, sans-serif" font-size="13" fill="#23424a" font-weight="bold">Spin-averaged squared amplitude (high-energy limit s, |t|, |u| ≫ m²):</text>
  <text x="60" y="484" font-family="Arial, sans-serif" font-size="13" fill="#23424a">|𝓜̄|² = 2e⁴ [ (u² + s²)/t² + (u² + t²)/s² + 2u²/(ts) ]</text>
  <text x="60" y="504" font-family="Arial, sans-serif" font-size="13" fill="#23424a">dσ/dΩ|_CM = (α² / 2s) · [ (1 + cos⁴(θ/2))/sin⁴(θ/2) − 2cos⁴(θ/2)/sin²(θ/2) + (1 + cos²θ)/2 ] + 𝒪(m²/s)</text>
</svg>
