<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 960 420" role="img" aria-labelledby="title desc">
  <title id="title">Atiyah-Singer index theorem bridge</title>
  <desc id="desc">An elliptic operator maps through an analytic index and a topological symbol class to the same integer.</desc>
  <rect width="960" height="420" fill="#f8fafc"/>
  <defs>
    <linearGradient id="bridge" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#dbeafe"/>
      <stop offset="0.5" stop-color="#f0fdf4"/>
      <stop offset="1" stop-color="#fef3c7"/>
    </linearGradient>
  </defs>
  <rect x="70" y="70" width="820" height="260" rx="8" fill="url(#bridge)" stroke="#0f172a" stroke-width="3"/>
  <g fill="#ffffff" stroke="#334155" stroke-width="3">
    <rect x="105" y="145" width="185" height="110" rx="8"/>
    <rect x="388" y="92" width="185" height="110" rx="8"/>
    <rect x="388" y="220" width="185" height="110" rx="8"/>
    <rect x="670" y="145" width="185" height="110" rx="8"/>
  </g>
  <g fill="none" stroke="#2563eb" stroke-width="6" stroke-linecap="round" stroke-linejoin="round">
    <path d="M290 174 C335 150 350 145 388 145"/>
    <path d="M290 226 C335 250 350 274 388 276"/>
    <path d="M573 147 C620 155 635 170 670 185"/>
    <path d="M573 276 C620 260 635 230 670 214"/>
  </g>
  <g font-family="Inter, Arial, sans-serif" fill="#0f172a" text-anchor="middle">
    <text x="197" y="182" font-size="22" font-weight="700">elliptic</text>
    <text x="197" y="211" font-size="22" font-weight="700">operator D</text>
    <text x="480" y="132" font-size="20" font-weight="700">analysis</text>
    <text x="480" y="160" font-size="18">kernel - cokernel</text>
    <text x="480" y="260" font-size="20" font-weight="700">topology</text>
    <text x="480" y="288" font-size="18">symbol class</text>
    <text x="762" y="190" font-size="34" font-weight="800">same</text>
    <text x="762" y="224" font-size="24" font-weight="700">integer</text>
    <text x="480" y="385" font-size="24" font-weight="700">ind(D) = topological index of the symbol</text>
  </g>
</svg>
