<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 720 360" role="img" aria-labelledby="title desc">
  <title id="title">Pullback from a classifying space</title>
  <desc id="desc">A base space maps to a classifying space, and a universal bundle pulls back to a bundle over the base.</desc>
  <rect width="720" height="360" fill="#f7f7f2"/>
  <ellipse cx="190" cy="250" rx="120" ry="44" fill="#d6e6f2" stroke="#2f5873" stroke-width="2"/>
  <text x="176" y="258" font-family="Arial, sans-serif" font-size="22" fill="#193143">X</text>
  <ellipse cx="530" cy="250" rx="120" ry="44" fill="#f1dfc4" stroke="#7a5a24" stroke-width="2"/>
  <text x="512" y="258" font-family="Arial, sans-serif" font-size="22" fill="#463414">BG</text>
  <rect x="455" y="82" width="150" height="82" rx="8" fill="#d9ead3" stroke="#315f3c" stroke-width="2"/>
  <text x="501" y="130" font-family="Arial, sans-serif" font-size="22" fill="#1d2b1f">EG</text>
  <rect x="115" y="82" width="150" height="82" rx="8" fill="#e8d9ee" stroke="#684275" stroke-width="2"/>
  <text x="164" y="130" font-family="Arial, sans-serif" font-size="22" fill="#3f2448">f*EG</text>
  <path d="M310 250 H405" stroke="#333" stroke-width="3" marker-end="url(#arrow)"/>
  <text x="350" y="232" font-family="Arial, sans-serif" font-size="20" fill="#333">f</text>
  <path d="M530 164 V205" stroke="#333" stroke-width="3" marker-end="url(#arrow)"/>
  <path d="M190 164 V205" stroke="#333" stroke-width="3" marker-end="url(#arrow)"/>
  <path d="M455 122 H270" stroke="#333" stroke-width="3" stroke-dasharray="7 7" marker-end="url(#arrow)"/>
  <text x="318" y="107" font-family="Arial, sans-serif" font-size="18" fill="#333">pull back</text>
  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#333"/>
    </marker>
  </defs>
</svg>
