<svg xmlns="http://www.w3.org/2000/svg" width="720" height="420" viewBox="0 0 720 420" role="img" aria-labelledby="title desc">
  <title id="title">Ideal absorbs multiplication</title>
  <desc id="desc">A smaller region inside an algebra absorbs products from the left and right by elements of the larger algebra.</desc>
  <rect width="720" height="420" fill="#f5f1e9"/>
  <ellipse cx="360" cy="215" rx="250" ry="140" fill="#dceefb" stroke="#2f5f89" stroke-width="5"/>
  <ellipse cx="360" cy="215" rx="120" ry="68" fill="#e8d8c8" stroke="#785331" stroke-width="5"/>
  <text x="360" y="105" text-anchor="middle" font-family="Arial, sans-serif" font-size="26" fill="#243447">algebra A</text>
  <text x="360" y="224" text-anchor="middle" font-family="Arial, sans-serif" font-size="26" fill="#243447">ideal I</text>
  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="8" markerHeight="8" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#39424e"/>
    </marker>
  </defs>
  <g stroke="#39424e" stroke-width="5" fill="none" marker-end="url(#arrow)">
    <path d="M 185 140 C 240 180, 275 205, 310 215"/>
    <path d="M 535 290 C 485 250, 445 225, 410 215"/>
  </g>
  <text x="160" y="136" text-anchor="middle" font-family="Arial, sans-serif" font-size="22" fill="#243447">a times x</text>
  <text x="562" y="312" text-anchor="middle" font-family="Arial, sans-serif" font-size="22" fill="#243447">x times a</text>
  <text x="360" y="370" text-anchor="middle" font-family="Arial, sans-serif" font-size="22" fill="#243447">Multiplying an ideal element by algebra elements stays inside.</text>
</svg>
