<svg xmlns="http://www.w3.org/2000/svg" width="720" height="420" viewBox="0 0 720 420" role="img" aria-labelledby="title desc">
  <title id="title">Hamiltonian vector field diagram</title>
  <desc id="desc">A schematic diagram for hamiltonian vector field with a surface, arrows, and level curves.</desc>
  <rect width="720" height="420" fill="#f5f1e9"/>
  <ellipse cx="360" cy="220" rx="245" ry="130" fill="#dceefb" stroke="#2f5f89" stroke-width="5"/>
  <path d="M150 230 C230 140, 315 310, 400 210 S535 210, 585 150" fill="none" stroke="#7a4f9a" stroke-width="6"/>
  <path d="M195 290 C280 245, 415 255, 520 290" fill="none" stroke="#8a5a2b" stroke-width="5" stroke-dasharray="12 10"/>
  <defs><marker id="arrow" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="8" markerHeight="8" orient="auto-start-reverse"><path d="M0 0 L10 5 L0 10 z" fill="#26364a"/></marker></defs>
  <g stroke="#26364a" stroke-width="4" fill="none" marker-end="url(#arrow)"><path d="M280 210 L330 170"/><path d="M390 230 L455 205"/><path d="M465 160 L525 130"/></g>
  <text x="360" y="58" text-anchor="middle" font-family="Arial, sans-serif" font-size="28" fill="#243447">Hamiltonian vector field</text>
  <text x="360" y="370" text-anchor="middle" font-family="Arial, sans-serif" font-size="21" fill="#243447">Geometry is encoded by forms, flows, and invariant subspaces.</text>
</svg>