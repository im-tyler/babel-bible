<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 720 360" role="img" aria-labelledby="title desc">
  <title id="title">Group action on square corners</title>
  <desc id="desc">A square with labelled corners and an arrow showing a rotation sending each corner to the next.</desc>
  <rect width="720" height="360" fill="#f7f7f2"/>
  <rect x="250" y="80" width="220" height="220" fill="#d6e6f2" stroke="#2f5873" stroke-width="4"/>
  <g fill="#f1dfc4" stroke="#7a5a24" stroke-width="2">
    <circle cx="250" cy="80" r="24"/><circle cx="470" cy="80" r="24"/>
    <circle cx="470" cy="300" r="24"/><circle cx="250" cy="300" r="24"/>
  </g>
  <text x="244" y="88" font-family="Arial, sans-serif" font-size="20" fill="#463414">0</text>
  <text x="464" y="88" font-family="Arial, sans-serif" font-size="20" fill="#463414">1</text>
  <text x="464" y="308" font-family="Arial, sans-serif" font-size="20" fill="#463414">2</text>
  <text x="244" y="308" font-family="Arial, sans-serif" font-size="20" fill="#463414">3</text>
  <path d="M360 52 C462 58 520 132 520 190" fill="none" stroke="#333" stroke-width="4" marker-end="url(#arrow)"/>
  <text x="510" y="130" font-family="Arial, sans-serif" font-size="22" fill="#333">rotate</text>
  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#333"/>
    </marker>
  </defs>
</svg>
