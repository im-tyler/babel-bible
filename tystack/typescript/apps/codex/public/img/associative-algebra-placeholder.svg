<svg xmlns="http://www.w3.org/2000/svg" width="720" height="420" viewBox="0 0 720 420" role="img" aria-labelledby="title desc">
  <title id="title">Associative algebra multiplication</title>
  <desc id="desc">Three blocks a b c are grouped in two different ways and both lead to the same product.</desc>
  <rect width="720" height="420" fill="#f4f0e8"/>
  <g font-family="Arial, sans-serif" text-anchor="middle" fill="#243447">
    <text x="360" y="54" font-size="26">Multiplication has stable grouping</text>
    <text x="235" y="115" font-size="24">(ab)c</text>
    <text x="485" y="115" font-size="24">a(bc)</text>
  </g>
  <g stroke="#2e5f85" stroke-width="4" fill="#dceefb">
    <rect x="130" y="145" width="70" height="70" rx="8"/>
    <rect x="205" y="145" width="70" height="70" rx="8"/>
    <rect x="280" y="145" width="70" height="70" rx="8"/>
  </g>
  <g stroke="#785331" stroke-width="4" fill="#ead9c5">
    <rect x="370" y="145" width="70" height="70" rx="8"/>
    <rect x="445" y="145" width="70" height="70" rx="8"/>
    <rect x="520" y="145" width="70" height="70" rx="8"/>
  </g>
  <g font-family="Arial, sans-serif" font-size="28" text-anchor="middle" fill="#243447">
    <text x="165" y="190">a</text>
    <text x="240" y="190">b</text>
    <text x="315" y="190">c</text>
    <text x="405" y="190">a</text>
    <text x="480" y="190">b</text>
    <text x="555" y="190">c</text>
  </g>
  <path d="M 165 238 C 185 285, 245 285, 265 238" fill="none" stroke="#5a5596" stroke-width="5"/>
  <path d="M 405 238 C 425 300, 535 300, 555 238" fill="none" stroke="#5a5596" stroke-width="5"/>
  <line x1="240" y1="315" x2="480" y2="315" stroke="#39424e" stroke-width="5"/>
  <text x="360" y="355" text-anchor="middle" font-family="Arial, sans-serif" font-size="24" fill="#243447">same result</text>
</svg>
