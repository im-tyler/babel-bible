<svg xmlns="http://www.w3.org/2000/svg" width="720" height="420" viewBox="0 0 720 420" role="img" aria-labelledby="title desc">
  <title id="title">Field operations</title>
  <desc id="desc">A number line with addition, multiplication, additive inverse, and multiplicative inverse shown as reliable operations.</desc>
  <rect width="720" height="420" fill="#f8f1e8"/>
  <line x1="90" y1="210" x2="630" y2="210" stroke="#29384a" stroke-width="5"/>
  <g stroke="#29384a" stroke-width="3">
    <line x1="160" y1="190" x2="160" y2="230"/>
    <line x1="260" y1="190" x2="260" y2="230"/>
    <line x1="360" y1="190" x2="360" y2="230"/>
    <line x1="460" y1="190" x2="460" y2="230"/>
    <line x1="560" y1="190" x2="560" y2="230"/>
  </g>
  <text x="160" y="265" text-anchor="middle" font-family="Arial, sans-serif" font-size="20" fill="#29384a">-2</text>
  <text x="260" y="265" text-anchor="middle" font-family="Arial, sans-serif" font-size="20" fill="#29384a">-1</text>
  <text x="360" y="265" text-anchor="middle" font-family="Arial, sans-serif" font-size="20" fill="#29384a">0</text>
  <text x="460" y="265" text-anchor="middle" font-family="Arial, sans-serif" font-size="20" fill="#29384a">1</text>
  <text x="560" y="265" text-anchor="middle" font-family="Arial, sans-serif" font-size="20" fill="#29384a">2</text>
  <g fill="#dfeefb" stroke="#2e5f85" stroke-width="4">
    <rect x="95" y="50" width="150" height="62" rx="8"/>
    <rect x="285" y="50" width="150" height="62" rx="8"/>
    <rect x="475" y="50" width="150" height="62" rx="8"/>
  </g>
  <text x="170" y="88" text-anchor="middle" font-family="Arial, sans-serif" font-size="22" fill="#203040">add</text>
  <text x="360" y="88" text-anchor="middle" font-family="Arial, sans-serif" font-size="22" fill="#203040">multiply</text>
  <text x="550" y="88" text-anchor="middle" font-family="Arial, sans-serif" font-size="22" fill="#203040">divide by nonzero</text>
  <path d="M 255 150 C 310 105, 410 105, 465 150" fill="none" stroke="#8a4f2d" stroke-width="5"/>
  <path d="M 465 150 C 410 175, 310 175, 255 150" fill="none" stroke="#8a4f2d" stroke-width="5"/>
  <text x="360" y="335" text-anchor="middle" font-family="Arial, sans-serif" font-size="23" fill="#29384a">Field rules make arithmetic stable.</text>
</svg>
