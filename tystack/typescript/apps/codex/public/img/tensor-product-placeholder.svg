<svg xmlns="http://www.w3.org/2000/svg" width="720" height="420" viewBox="0 0 720 420" role="img" aria-labelledby="title desc">
  <title id="title">Tensor product pairs inputs into one combined object</title>
  <desc id="desc">Two vector shelves feed pairs into a central combined shelf labeled tensor product.</desc>
  <rect width="720" height="420" fill="#f5f1e9"/>
  <rect x="60" y="95" width="155" height="210" rx="10" fill="#d9ecfb" stroke="#2f5f89" stroke-width="4"/>
  <rect x="505" y="95" width="155" height="210" rx="10" fill="#e8d8c8" stroke="#785331" stroke-width="4"/>
  <rect x="275" y="80" width="170" height="240" rx="10" fill="#e5e3f8" stroke="#5a5596" stroke-width="4"/>
  <text x="137" y="70" text-anchor="middle" font-family="Arial, sans-serif" font-size="24" fill="#243447">V</text>
  <text x="582" y="70" text-anchor="middle" font-family="Arial, sans-serif" font-size="24" fill="#243447">W</text>
  <text x="360" y="55" text-anchor="middle" font-family="Arial, sans-serif" font-size="24" fill="#243447">combined space</text>
  <g font-family="Arial, sans-serif" font-size="21" fill="#243447">
    <text x="137" y="150" text-anchor="middle">v1</text>
    <text x="137" y="210" text-anchor="middle">v2</text>
    <text x="137" y="270" text-anchor="middle">v3</text>
    <text x="582" y="150" text-anchor="middle">w1</text>
    <text x="582" y="210" text-anchor="middle">w2</text>
    <text x="582" y="270" text-anchor="middle">w3</text>
    <text x="360" y="145" text-anchor="middle">v1 with w1</text>
    <text x="360" y="205" text-anchor="middle">v1 with w2</text>
    <text x="360" y="265" text-anchor="middle">v2 with w1</text>
  </g>
  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="8" markerHeight="8" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#39424e"/>
    </marker>
  </defs>
  <g stroke="#39424e" stroke-width="4" marker-end="url(#arrow)" fill="none">
    <path d="M 215 150 L 275 145"/>
    <path d="M 505 150 L 445 145"/>
    <path d="M 215 210 L 275 265"/>
    <path d="M 505 210 L 445 205"/>
  </g>
  <text x="360" y="370" text-anchor="middle" font-family="Arial, sans-serif" font-size="22" fill="#243447">Pairing is linear in each slot.</text>
</svg>
