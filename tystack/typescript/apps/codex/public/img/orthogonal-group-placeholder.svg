<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 720 360" role="img" aria-labelledby="title desc">
  <title id="title">Orthogonal transformation of a frame</title>
  <desc id="desc">Two perpendicular unit vectors transformed to another perpendicular unit frame.</desc>
  <rect width="720" height="360" fill="#f7f7f2"/>
  <g stroke-width="5" stroke-linecap="round">
    <path d="M170 240 L250 240" stroke="#2f5873" marker-end="url(#blue)"/>
    <path d="M170 240 L170 160" stroke="#315f3c" marker-end="url(#green)"/>
    <path d="M500 240 L558 182" stroke="#2f5873" marker-end="url(#blue)"/>
    <path d="M500 240 L442 182" stroke="#315f3c" marker-end="url(#green)"/>
  </g>
  <path d="M285 210 C350 150 400 150 455 210" fill="none" stroke="#333" stroke-width="3" marker-end="url(#arrow)"/>
  <text x="315" y="140" font-family="Arial, sans-serif" font-size="22" fill="#333">orthogonal map</text>
  <text x="118" y="285" font-family="Arial, sans-serif" font-size="20" fill="#193143">before</text>
  <text x="460" y="285" font-family="Arial, sans-serif" font-size="20" fill="#193143">after</text>
  <defs>
    <marker id="blue" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#2f5873"/>
    </marker>
    <marker id="green" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#315f3c"/>
    </marker>
    <marker id="arrow" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#333"/>
    </marker>
  </defs>
</svg>
