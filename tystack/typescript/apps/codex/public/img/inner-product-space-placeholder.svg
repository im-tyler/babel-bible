<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 720 360" role="img" aria-labelledby="title desc">
  <title id="title">Inner product projection</title>
  <desc id="desc">A vector projected onto another vector with a perpendicular error.</desc>
  <rect width="720" height="360" fill="#f7f7f2"/>
  <line x1="100" y1="280" x2="620" y2="280" stroke="#ddd" stroke-width="2"/>
  <path d="M130 280 L560 160" stroke="#2f5873" stroke-width="5" marker-end="url(#blue)"/>
  <path d="M130 280 L470 280" stroke="#7a5a24" stroke-width="5" marker-end="url(#brown)"/>
  <path d="M560 160 L470 280" stroke="#315f3c" stroke-width="4" stroke-dasharray="8 6"/>
  <path d="M452 280 L452 260 L472 260" fill="none" stroke="#333" stroke-width="3"/>
  <text x="570" y="158" font-family="Arial, sans-serif" font-size="22" fill="#193143">v</text>
  <text x="310" y="305" font-family="Arial, sans-serif" font-size="21" fill="#463414">projection</text>
  <text x="495" y="232" font-family="Arial, sans-serif" font-size="20" fill="#1d2b1f">orthogonal error</text>
  <defs>
    <marker id="blue" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse"><path d="M 0 0 L 10 5 L 0 10 z" fill="#2f5873"/></marker>
    <marker id="brown" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse"><path d="M 0 0 L 10 5 L 0 10 z" fill="#7a5a24"/></marker>
  </defs>
</svg>
