<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 720 360" role="img" aria-labelledby="title desc">
  <title id="title">Normed vector space</title>
  <desc id="desc">Two vectors and their difference measured by a norm.</desc>
  <rect width="720" height="360" fill="#f7f7f2"/>
  <line x1="90" y1="280" x2="650" y2="280" stroke="#ddd" stroke-width="2"/>
  <line x1="120" y1="320" x2="120" y2="55" stroke="#ddd" stroke-width="2"/>
  <path d="M120 280 L310 120" stroke="#2f5873" stroke-width="5" marker-end="url(#blue)"/>
  <path d="M120 280 L430 210" stroke="#7a5a24" stroke-width="5" marker-end="url(#brown)"/>
  <path d="M310 120 L430 210" stroke="#315f3c" stroke-width="4" stroke-dasharray="8 6" marker-end="url(#green)"/>
  <text x="260" y="105" font-family="Arial, sans-serif" font-size="22" fill="#193143">v</text>
  <text x="438" y="215" font-family="Arial, sans-serif" font-size="22" fill="#463414">w</text>
  <text x="345" y="150" font-family="Arial, sans-serif" font-size="20" fill="#1d2b1f">||v-w||</text>
  <defs>
    <marker id="blue" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse"><path d="M 0 0 L 10 5 L 0 10 z" fill="#2f5873"/></marker>
    <marker id="brown" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse"><path d="M 0 0 L 10 5 L 0 10 z" fill="#7a5a24"/></marker>
    <marker id="green" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse"><path d="M 0 0 L 10 5 L 0 10 z" fill="#315f3c"/></marker>
  </defs>
</svg>
